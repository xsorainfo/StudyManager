<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ===== Favicon ===== -->
  <link rel="icon" type="image/png" href="/StudyManager/favicon.png">
  
  <title>学習管理システム</title>
  <!-- ★ 共通スタイル ★ -->
  <link rel="stylesheet" href="/StudyManager/scripts/common.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Helvetica Neue', 'Noto Sans JP', system-ui, sans-serif; }
    body { background: #f5f2ec; color: #1e1a16; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .app-wrapper { max-width: 1400px; width: 100%; background: #fcf9f5; border-radius: 40px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); padding: 24px 30px 40px; }

    .dashboard-grid { display: grid; grid-template-columns: 2fr 1.2fr; gap: 28px; margin-top: 10px; }
    .card { background: #fffffffa; border-radius: 28px; padding: 22px 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); border: 1px solid #ede8e0; margin-bottom: 24px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e7dfd5; padding-bottom: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .card-header h2 { font-size: 1.3rem; font-weight: 600; color: #2a221b; display: flex; align-items: center; gap: 10px; }
    .card-header h2 i { color: #8f735b; font-size: 1.2rem; }
    .card-header .badge { background: #e7ddd2; border-radius: 40px; padding: 4px 16px; font-size: 0.75rem; font-weight: 600; color: #3d3229; }
    .btn { background: #2c241c; border: none; color: white; padding: 8px 20px; border-radius: 60px; font-weight: 600; font-size: 0.8rem; cursor: pointer; transition: 0.15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { background: #4d3b2c; transform: scale(0.97); }
    .btn-sm { padding: 4px 14px; font-size: 0.75rem; }
    .btn-outline { background: transparent; color: #2c241c; border: 2px solid #d8cdbf; }
    .btn-outline:hover { background: #f0ebe4; }
    .btn-success { background: #3d6b4a; }
    .btn-success:hover { background: #2d5238; }
    .btn-danger { background: #8f4a4a; }
    .btn-danger:hover { background: #6d3838; }

    .year-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 4px; }
    .year-item { background: #f6f1ea; border-radius: 20px; padding: 12px; text-align: center; border: 1px solid transparent; }
    .year-item:hover { border-color: #b7a086; background: #f3ece3; }
    .year-item .year-label { font-weight: 700; font-size: 0.9rem; color: #3b2e22; }
    .year-item .year-sub { font-size: 0.7rem; color: #6f5d4b; margin-top: 2px; }
    .year-progress { margin-top: 8px; height: 6px; background: #ddd2c6; border-radius: 20px; overflow: hidden; }
    .year-progress .bar { height: 100%; background: #96785c; border-radius: 20px; width: 0%; transition: width 0.3s; }

    .tetsu-list { list-style: none; padding: 0; }
    .tetsu-list li { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #ede6dd; }
    .tetsu-list li:last-child { border-bottom: 0; }
    .tetsu-item-left { display: flex; align-items: center; gap: 12px; }
    .tetsu-item-left .icon { width: 32px; height: 32px; background: #e6dbd0; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #4f3d2e; }
    .tetsu-name { font-weight: 500; }
    .tetsu-progress { display: flex; align-items: center; gap: 12px; }
    .progress-track { width: 100px; height: 6px; background: #e1d6ca; border-radius: 20px; }
    .progress-track .fill { height: 100%; background: #96785c; border-radius: 20px; width: 0%; transition: width 0.3s; }
    .progress-label { font-size: 0.8rem; font-weight: 500; color: #4d3f31; min-width: 40px; }

    .review-card { background: #f2ede6; border-radius: 24px; padding: 16px 20px; margin: 16px 0 8px; }
    .review-card ul { list-style: none; padding-left: 6px; }
    .review-card li { display: flex; gap: 10px; padding: 6px 0; align-items: center; }

    .score-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .score-table th { text-align: left; padding: 6px 8px; border-bottom: 2px solid #e7dfd5; color: #3d3229; }
    .score-table td { padding: 6px 8px; border-bottom: 1px solid #ede6dd; }
    .score-table .delete-btn { color: #8f4a4a; cursor: pointer; padding: 2px 8px; border-radius: 20px; }
    .score-table .delete-btn:hover { background: #f5e0e0; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: #fffcf7; border-radius: 32px; padding: 32px 36px; max-width: 520px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-box .field { margin: 14px 0; }
    .modal-box .field label { display: block; font-weight: 500; margin-bottom: 4px; color: #3d3229; }
    .modal-box .field input, .modal-box .field select { width: 100%; padding: 10px 16px; border: 1px solid #d8cdbf; border-radius: 16px; font-size: 0.95rem; background: white; outline: none; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }

    .toast-msg { background: #2c241c; color: #f0e8de; padding: 6px 18px; border-radius: 60px; font-size: 0.8rem; position: fixed; bottom: 30px; right: 30px; z-index: 999; opacity: 0; transition: 0.2s; }
    .toast-msg.show { opacity: 1; }
    #fileInput { display: none; }
    .flex { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .text-muted { color: #6b5d4e; font-size: 0.85rem; }

    @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } .year-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .app-wrapper { padding: 16px; } .navbar { flex-direction: column; gap: 12px; } .nav-links { justify-content: center; } .nav-right { justify-content: center; } .token-bar input { min-width: 150px; } }
  </style>
</head>
<body>

<div class="app-wrapper">

  <!-- ===== 导航コンテナ（共通JSで自動生成） ===== -->
  <div id="navbarContainer"></div>
  <div id="tokenBarContainer"></div>

  <!-- ===== 仪表板 ===== -->
  <div id="dashboardView">
    <div class="dashboard-grid">
      <!-- 左列 -->
      <div class="left-col">
        <div class="card">
          <div class="card-header">
            <h2><i class="fas fa-layer-group"></i> 学年学習大纲</h2>
            <span class="badge">6年間</span>
          </div>
          <div class="year-grid" id="yearGrid"></div>
          <div class="flex" style="justify-content: flex-end; margin-top: 10px;">
            <span class="text-muted"><i class="far fa-clock"></i> 更新: <span id="lastUpdate">2026-06-28</span></span>
            <span class="text-muted" style="margin-left:12px;"><i class="fas fa-database"></i> <span id="dataSize">0KB</span></span>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2><i class="fas fa-book-open"></i> 考前复习</h2>
            <button class="btn btn-sm btn-outline" onclick="openModal('review')"><i class="fas fa-plus"></i> 追加</button>
          </div>
          <div id="reviewList"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2><i class="fas fa-save"></i> 成績登録</h2>
            <button class="btn btn-sm btn-outline" onclick="openModal('score')"><i class="fas fa-plus"></i> 追加</button>
          </div>
          <div id="scoreList"></div>
        </div>
      </div>

      <!-- 右列 -->
      <div class="right-col">
        <div class="card">
          <div class="card-header">
            <h2><i class="fas fa-flag"></i> 鉄律会 学習大纲</h2>
            <button class="btn btn-sm btn-outline" onclick="openModal('tetsu')"><i class="fas fa-plus"></i> 追加</button>
          </div>
          <ul class="tetsu-list" id="tetsuList"></ul>
          <div style="margin-top: 14px; background: #f0eae2; border-radius: 40px; padding: 8px 18px; display: flex; justify-content: space-between;">
            <span><i class="fas fa-tasks"></i> 総合進捗</span>
            <span style="font-weight: 700;" id="totalProgress">0%</span>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2><i class="fas fa-calendar-check"></i> 鉄律会 学習進度</h2>
            <button class="btn btn-sm btn-outline" onclick="openModal('schedule')"><i class="fas fa-plus"></i> 追加</button>
          </div>
          <div id="scheduleList"></div>
        </div>

        <div class="card" style="background: #f4efe8;">
          <div style="display: flex; gap: 12px; align-items: center;">
            <i class="fas fa-pencil-alt" style="font-size:1.6rem; color:#6f5d4b;"></i>
            <div>
              <strong>直近試験範囲</strong>
              <div style="font-size:0.85rem; color:#4d3f31;" id="recentExams">読み込み中...</div>
            </div>
            <button class="btn btn-sm btn-outline" onclick="openModal('exam')" style="margin-left:auto;"><i class="fas fa-plus"></i></button>
          </div>
        </div>

        <div class="card" style="background: #e8e0d6; border: 2px dashed #8f735b;">
          <div style="display: flex; gap: 12px; align-items: center; font-size:0.9rem;">
            <i class="fas fa-github" style="color:#5f4b38; font-size:1.4rem;"></i>
            <div>
              <strong>GitHub 保存先</strong><br>
              <span style="font-size:0.8rem; color:#4d3f31;">
                main 分支 · data/data.json
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 模态框 ===== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <h3 id="modalTitle"><i class="fas fa-edit"></i> 項目追加</h3>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
        <button class="btn" onclick="saveModal()">保存</button>
      </div>
    </div>
  </div>

  <div class="toast-msg" id="toast"></div>
</div>

<script>
// ============================================================
// 🔧 データボタン表示設定（ダッシュボードでは表示）
// ============================================================
window.SHOW_EXPORT = true;
window.SHOW_IMPORT = true;
// ============================================================
</script>
<script src="../scripts/common.js"></script>
<script>
// ==================== データ管理 ====================
const DB = {
    get(key, def) {
        try { return JSON.parse(localStorage.getItem('study_' + key)) || def; }
        catch { return def; }
    },
    set(key, val) { localStorage.setItem('study_' + key, JSON.stringify(val)); }
};

const defaultData = {
    years: [
        { id:'y1', name:'中1', sub:'基礎', progress:45 },
        { id:'y2', name:'中2', sub:'発展', progress:72 },
        { id:'y3', name:'中3', sub:'応用', progress:30 },
        { id:'y4', name:'高1', sub:'標準', progress:10 },
        { id:'y5', name:'高2', sub:'演習', progress:5 },
        { id:'y6', name:'高3', sub:'総仕上げ', progress:0 }
    ],
    scores: [
        { id:'s1', subject:'中2 歴史', score:86, date:'2026-06-27' },
        { id:'s2', subject:'中2 数学', score:72, date:'2026-06-25' },
        { id:'s3', subject:'中2 国語', score:90, date:'2026-06-20' }
    ],
    reviews: [
        { id:'r1', title:'歴史: 元禄文化・赤穂事件 暗記', done:false },
        { id:'r2', title:'数学: 一次関数グラフ 演習問題', done:false },
        { id:'r3', title:'英語: 不定詞・動名詞 復習', done:true }
    ],
    tetsu: [
        { id:'t1', name:'古文・漢文', progress:68, icon:'fa-scroll' },
        { id:'t2', name:'数学 応用', progress:42, icon:'fa-calculator' },
        { id:'t3', name:'歴史・地理', progress:81, icon:'fa-globe-asia' },
        { id:'t4', name:'理科 物理', progress:25, icon:'fa-flask' }
    ],
    schedules: [
        { id:'s1', text:'第1週: 漢文 訓読 完了', done:true },
        { id:'s2', text:'第2週: 江戸時代 基礎 完了', done:true },
        { id:'s3', text:'第3週: 関数 演習中 (70%)', done:false },
        { id:'s4', text:'第4週: 化学 未着手', done:false }
    ],
    exams: [
        { id:'e1', name:'中2 歴史 期末', range:'p.36-39 (江戸時代)' },
        { id:'e2', name:'中2 国語 漢文', range:'『論語』『孟子』' },
        { id:'e3', name:'中2 数学 関数', range:'一次関数・連立方程式' }
    ]
};

let data = {};
let currentModal = { type: '', id: null };

function loadData() {
    data = {
        years: DB.get('years', defaultData.years),
        scores: DB.get('scores', defaultData.scores),
        reviews: DB.get('reviews', defaultData.reviews),
        tetsu: DB.get('tetsu', defaultData.tetsu),
        schedules: DB.get('schedules', defaultData.schedules),
        exams: DB.get('exams', defaultData.exams)
    };
    for (let key of ['years','scores','reviews','tetsu','schedules','exams']) {
        if (!data[key] || data[key].length === 0) {
            data[key] = defaultData[key];
            DB.set(key, data[key]);
        }
    }
    updateDataSize();
}

function saveData() {
    for (let key of ['years','scores','reviews','tetsu','schedules','exams']) {
        DB.set(key, data[key]);
    }
    document.getElementById('lastUpdate').textContent = new Date().toISOString().slice(0,10);
    updateDataSize();
    showToast('💾 ローカル保存しました');
}

function updateDataSize() {
    const size = (new Blob([JSON.stringify(data)]).size / 1024).toFixed(1);
    document.getElementById('dataSize').textContent = size + 'KB';
}

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ==================== レンダリング ====================
function renderAll() {
    renderYears();
    renderScores();
    renderReviews();
    renderTetsu();
    renderSchedules();
    renderRecentExams();
    updateTotalProgress();
}

function renderYears() {
    document.getElementById('yearGrid').innerHTML = data.years.map(y => `
        <div class="year-item">
            <div class="year-label">${y.name}</div>
            <div class="year-sub">${y.sub}</div>
            <div class="year-progress"><div class="bar" style="width:${y.progress}%"></div></div>
        </div>
    `).join('');
}

function renderScores() {
    const c = document.getElementById('scoreList');
    if (data.scores.length === 0) {
        c.innerHTML = '<p class="text-muted">まだ成績がありません</p>';
        return;
    }
    c.innerHTML = `
        <table class="score-table">
            <thead><tr><th>科目</th><th>得点</th><th>日付</th><th></th></tr></thead>
            <tbody>
                ${data.scores.map(s => `
                    <tr>
                        <td>${s.subject}</td>
                        <td><strong>${s.score}</strong> / 100</td>
                        <td>${s.date || '-'}</td>
                        <td><span class="delete-btn" onclick="deleteItem('scores','${s.id}')"><i class="fas fa-trash"></i></span></td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

function renderReviews() {
    const c = document.getElementById('reviewList');
    if (data.reviews.length === 0) {
        c.innerHTML = '<p class="text-muted">复习项目がありません</p>';
        return;
    }
    c.innerHTML = `
        <div class="review-card">
            <ul>
                ${data.reviews.map(r => `
                    <li>
                        <span onclick="toggleReview('${r.id}')" style="cursor:pointer;">
                            <i class="${r.done ? 'fas fa-check-circle' : 'far fa-circle'}" style="color:${r.done ? '#6a8f6a' : '#b7a086'};"></i>
                        </span>
                        <span style="${r.done ? 'text-decoration:line-through; opacity:0.6;' : ''}">${r.title}</span>
                        <span onclick="deleteItem('reviews','${r.id}')" style="margin-left:auto;color:#8f4a4a;cursor:pointer;"><i class="fas fa-trash"></i></span>
                    </li>
                `).join('')}
            </ul>
        </div>
    `;
}

function renderTetsu() {
    const c = document.getElementById('tetsuList');
    if (data.tetsu.length === 0) {
        c.innerHTML = '<li class="text-muted">鉄律会項目がありません</li>';
        return;
    }
    c.innerHTML = data.tetsu.map(t => `
        <li>
            <div class="tetsu-item-left">
                <span class="icon"><i class="fas ${t.icon || 'fa-book'}"></i></span>
                <span class="tetsu-name">${t.name}</span>
            </div>
            <div class="tetsu-progress">
                <div class="progress-track"><div class="fill" style="width:${t.progress}%"></div></div>
                <span class="progress-label">${t.progress}%</span>
                <span onclick="deleteItem('tetsu','${t.id}')" style="color:#8f4a4a;cursor:pointer;"><i class="fas fa-trash"></i></span>
            </div>
        </li>
    `).join('');
}

function renderSchedules() {
    const c = document.getElementById('scheduleList');
    if (data.schedules.length === 0) {
        c.innerHTML = '<p class="text-muted">進度項目がありません</p>';
        return;
    }
    c.innerHTML = data.schedules.map(s => `
        <div style="display:flex; gap:10px; padding:6px 0; align-items:center; border-bottom:1px solid #ede6dd;">
            <span onclick="toggleSchedule('${s.id}')" style="cursor:pointer;">
                <i class="${s.done ? 'fas fa-check-circle' : 'far fa-circle'}" style="color:${s.done ? '#6a8f6a' : '#b7a086'};"></i>
            </span>
            <span style="${s.done ? 'text-decoration:line-through; opacity:0.6;' : ''}">${s.text}</span>
            <span onclick="deleteItem('schedules','${s.id}')" style="margin-left:auto;color:#8f4a4a;cursor:pointer;"><i class="fas fa-trash"></i></span>
        </div>
    `).join('');
}

function renderRecentExams() {
    const c = document.getElementById('recentExams');
    if (data.exams.length === 0) {
        c.textContent = '試験範囲が設定されていません';
        return;
    }
    c.innerHTML = data.exams.slice(0,3).map(e => `${e.name} (${e.range})`).join(' · ');
}

function updateTotalProgress() {
    if (data.tetsu.length === 0) {
        document.getElementById('totalProgress').textContent = '0%';
        return;
    }
    const avg = Math.round(data.tetsu.reduce((s, t) => s + t.progress, 0) / data.tetsu.length);
    document.getElementById('totalProgress').textContent = avg + '%';
}

// ==================== 操作 ====================
function toggleReview(id) {
    const item = data.reviews.find(r => r.id === id);
    if (item) { item.done = !item.done; saveData(); renderReviews(); }
}

function toggleSchedule(id) {
    const item = data.schedules.find(s => s.id === id);
    if (item) { item.done = !item.done; saveData(); renderSchedules(); }
}

function deleteItem(collection, id) {
    if (!confirm('削除しますか？')) return;
    data[collection] = data[collection].filter(item => item.id !== id);
    saveData();
    renderAll();
}

// ==================== モーダル ====================
function openModal(type, id = null) {
    const overlay = document.getElementById('modalOverlay');
    const body = document.getElementById('modalBody');
    const title = document.getElementById('modalTitle');
    currentModal = { type, id };
    const item = id ? data[type === 'score' ? 'scores' : type === 'review' ? 'reviews' : type === 'tetsu' ? 'tetsu' : type === 'schedule' ? 'schedules' : 'exams']?.find(i => i.id === id) : null;
    let html = '';
    switch(type) {
        case 'score':
            title.innerHTML = `<i class="fas fa-plus-circle"></i> ${item ? '成績編集' : '成績追加'}`;
            html = `
                <div class="field"><label>科目名</label><input id="f_subject" value="${item?.subject || ''}"></div>
                <div class="field"><label>得点 (0-100)</label><input id="f_score" type="number" value="${item?.score || ''}" min="0" max="100"></div>
                <div class="field"><label>日付</label><input id="f_date" type="date" value="${item?.date || new Date().toISOString().slice(0,10)}"></div>
            `;
            break;
        case 'review':
            title.innerHTML = `<i class="fas fa-plus-circle"></i> ${item ? '复习編集' : '复习追加'}`;
            html = `
                <div class="field"><label>复习項目</label><input id="f_title" value="${item?.title || ''}"></div>
                <div class="field"><label>完了</label><select id="f_done"><option value="true" ${item?.done ? 'selected' : ''}>完了</option><option value="false" ${!item?.done ? 'selected' : ''}>未完了</option></select></div>
            `;
            break;
        case 'tetsu':
            title.innerHTML = `<i class="fas fa-plus-circle"></i> ${item ? '鉄律会編集' : '鉄律会追加'}`;
            html = `
                <div class="field"><label>科目名</label><input id="f_name" value="${item?.name || ''}"></div>
                <div class="field"><label>進捗 (%)</label><input id="f_progress" type="number" value="${item?.progress || 0}" min="0" max="100"></div>
                <div class="field"><label>アイコン</label><input id="f_icon" value="${item?.icon || 'fa-book'}"></div>
            `;
            break;
        case 'schedule':
            title.innerHTML = `<i class="fas fa-plus-circle"></i> ${item ? '進度編集' : '進度追加'}`;
            html = `
                <div class="field"><label>進度内容</label><input id="f_text" value="${item?.text || ''}"></div>
                <div class="field"><label>完了</label><select id="f_done"><option value="true" ${item?.done ? 'selected' : ''}>完了</option><option value="false" ${!item?.done ? 'selected' : ''}>未完了</option></select></div>
            `;
            break;
        case 'exam':
            title.innerHTML = `<i class="fas fa-plus-circle"></i> ${item ? '試験範囲編集' : '試験範囲追加'}`;
            html = `
                <div class="field"><label>試験名</label><input id="f_name" value="${item?.name || ''}"></div>
                <div class="field"><label>範囲</label><input id="f_range" value="${item?.range || ''}"></div>
            `;
            break;
    }
    body.innerHTML = html;
    overlay.classList.add('active');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
}

function saveModal() {
    const { type, id } = currentModal;
    switch(type) {
        case 'score': {
            const subject = document.getElementById('f_subject').value.trim();
            const score = parseInt(document.getElementById('f_score').value);
            const date = document.getElementById('f_date').value;
            if (!subject || isNaN(score)) { showToast('科目と得点を入力してください'); return; }
            if (id) { const item = data.scores.find(s => s.id === id); if (item) { item.subject = subject; item.score = score; item.date = date; } }
            else { data.scores.push({ id: generateId(), subject, score, date }); }
            break;
        }
        case 'review': {
            const title = document.getElementById('f_title').value.trim();
            const done = document.getElementById('f_done').value === 'true';
            if (!title) { showToast('項目を入力してください'); return; }
            if (id) { const item = data.reviews.find(r => r.id === id); if (item) { item.title = title; item.done = done; } }
            else { data.reviews.push({ id: generateId(), title, done }); }
            break;
        }
        case 'tetsu': {
            const name = document.getElementById('f_name').value.trim();
            const progress = parseInt(document.getElementById('f_progress').value) || 0;
            const icon = document.getElementById('f_icon').value.trim() || 'fa-book';
            if (!name) { showToast('科目名を入力してください'); return; }
            if (id) { const item = data.tetsu.find(t => t.id === id); if (item) { item.name = name; item.progress = Math.min(100, Math.max(0, progress)); item.icon = icon; } }
            else { data.tetsu.push({ id: generateId(), name, progress: Math.min(100, Math.max(0, progress)), icon }); }
            break;
        }
        case 'schedule': {
            const text = document.getElementById('f_text').value.trim();
            const done = document.getElementById('f_done').value === 'true';
            if (!text) { showToast('内容を入力してください'); return; }
            if (id) { const item = data.schedules.find(s => s.id === id); if (item) { item.text = text; item.done = done; } }
            else { data.schedules.push({ id: generateId(), text, done }); }
            break;
        }
        case 'exam': {
            const name = document.getElementById('f_name').value.trim();
            const range = document.getElementById('f_range').value.trim();
            if (!name) { showToast('試験名を入力してください'); return; }
            if (id) { const item = data.exams.find(e => e.id === id); if (item) { item.name = name; item.range = range; } }
            else { data.exams.push({ id: generateId(), name, range }); }
            break;
        }
    }
    saveData();
    closeModal();
    renderAll();
    showToast('保存しました');
}
