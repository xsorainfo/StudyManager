<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学びの航路 · 中学六年学习管理系统</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* 共通スタイル（上記と同様） */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Helvetica Neue', 'Noto Sans JP', system-ui, sans-serif; }
    body { background: #f5f2ec; color: #1e1a16; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .app-wrapper { max-width: 1400px; width: 100%; background: #fcf9f5; border-radius: 40px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); padding: 24px 30px 40px; }
    
    /* 导航样式（同上） */
    .navbar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: #2c241c; padding: 10px 24px; border-radius: 60px; margin-bottom: 20px; color: #f0ebe3; }
    .nav-brand { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 1.25rem; }
    .nav-brand i { color: #e3c9a6; font-size: 1.6rem; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 6px 16px; font-weight: 500; }
    .nav-links a { color: #e8dfd5; text-decoration: none; padding: 6px 12px; border-radius: 40px; transition: 0.15s; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; }
    .nav-links a:hover { background: #3f352b; color: #fff; }
    .nav-links a.active { background: #5f4b38; color: #fff2e0; }
    .nav-right { display: flex; align-items: center; gap: 14px; font-size: 0.9rem; flex-wrap: wrap; }
    .nav-right .user-badge { background: #3f352b; padding: 6px 18px 6px 14px; border-radius: 40px; display: flex; align-items: center; gap: 8px; }
    .nav-right .data-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .nav-right .data-actions button { background: #3f352b; border: none; color: #e8dfd5; padding: 6px 14px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; transition: 0.15s; display: flex; align-items: center; gap: 5px; }
    .nav-right .data-actions button:hover { background: #5f4b38; color: #fff; }
    .nav-right .data-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }
    .status-dot.online { background: #4CAF50; }
    .status-dot.offline { background: #f44336; }

    .token-bar { background: #f0ebe4; border-radius: 20px; padding: 12px 20px; margin-bottom: 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .token-bar .label { font-weight: 600; color: #3d3229; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
    .token-bar input { flex: 1; min-width: 200px; padding: 8px 16px; border: 2px solid #d8cdbf; border-radius: 40px; font-size: 0.85rem; outline: none; background: white; font-family: monospace; }
    .token-bar input:focus { border-color: #8f735b; }
    .token-bar .token-status { font-size: 0.8rem; color: #6b5d4e; white-space: nowrap; }
    .token-bar .btn-set { background: #2c241c; border: none; color: white; padding: 6px 20px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.15s; }
    .token-bar .btn-set:hover { background: #4d3b2c; }

    .page-title { font-size: 1.8rem; font-weight: 700; color: #2a221b; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
    .page-title i { color: #8f735b; }

    .card { background: #fffffffa; border-radius: 28px; padding: 22px 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); border: 1px solid #ede8e0; margin-bottom: 24px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e7dfd5; padding-bottom: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .card-header h2 { font-size: 1.3rem; font-weight: 600; color: #2a221b; display: flex; align-items: center; gap: 10px; }
    .card-header h2 i { color: #8f735b; font-size: 1.2rem; }

    .btn { background: #2c241c; border: none; color: white; padding: 8px 20px; border-radius: 60px; font-weight: 600; font-size: 0.8rem; cursor: pointer; transition: 0.15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { background: #4d3b2c; transform: scale(0.97); }
    .btn-sm { padding: 4px 14px; font-size: 0.75rem; }
    .btn-outline { background: transparent; color: #2c241c; border: 2px solid #d8cdbf; }
    .btn-outline:hover { background: #f0ebe4; }

    .toast-msg { background: #2c241c; color: #f0e8de; padding: 6px 18px; border-radius: 60px; font-size: 0.8rem; position: fixed; bottom: 30px; right: 30px; z-index: 999; opacity: 0; transition: 0.2s; }
    .toast-msg.show { opacity: 1; }
    #fileInput { display: none; }
    .flex { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .text-muted { color: #6b5d4e; font-size: 0.85rem; }

    .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .content-grid { grid-template-columns: 1fr; } }

    .info-card { background: #f6f1ea; border-radius: 20px; padding: 18px 20px; }
    .info-card h3 { font-size: 1.1rem; color: #3b2e22; margin-bottom: 8px; }
    .info-card p { color: #5f4f3d; font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="app-wrapper">

  <!-- ===== 导航容器 ===== -->
  <div id="navbarContainer"></div>

  <!-- ===== Token 栏容器 ===== -->
  <div id="tokenBarContainer"></div>

  <!-- ===== 页面内容 ===== -->
  <div class="page-title">
    <i class="fas fa-flag"></i> 鉄律会
    <span style="font-size:0.9rem; font-weight:400; color:#6b5d4e; margin-left:12px;">学習進捗・管理</span>
  </div>

  <div class="content-grid" id="mainContent">
    <!-- 各ページのコンテンツ -->
    <div class="info-card">
      <h3><i class="fas fa-book" style="color:#8f735b;"></i> 鉄律会 学習項目</h3>
      <p>ここに鉄律会の学習内容を表示します</p>
    </div>
    <div class="info-card">
      <h3><i class="fas fa-chart-line" style="color:#8f735b;"></i> 進捗状況</h3>
      <p>現在の進捗を表示します</p>
    </div>
  </div>

  <div class="toast-msg" id="toast"></div>
</div>

<!-- ===== JavaScript ===== -->
<script src="../scripts/common.js"></script>
<script>
  // ページ固有のJavaScript
  document.addEventListener('DOMContentLoaded', function() {
    // 内容を動的に生成する場合など
    console.log('鉄律会ページ読み込み完了');
  });
</script>
</body>
</html>
