<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>試験 · 学び航路</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Helvetica Neue', 'Noto Sans JP', system-ui, sans-serif; }
    body { background: #f5f2ec; color: #1e1a16; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .app-wrapper { max-width: 1400px; width: 100%; background: #fcf9f5; border-radius: 40px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); padding: 24px 30px 40px; }

    /* 导航 */
    .navbar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: #2c241c; padding: 10px 24px; border-radius: 60px; margin-bottom: 20px; color: #f0ebe3; }
    .nav-brand { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 1.25rem; }
    .nav-brand i { color: #e3c9a6; font-size: 1.6rem; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 6px 16px; font-weight: 500; }
    .nav-links a { color: #e8dfd5; text-decoration: none; padding: 6px 12px; border-radius: 40px; transition: 0.15s; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; }
    .nav-links a:hover { background: #3f352b; color: #fff; }
    .nav-links a.active { background: #5f4b38; color: #fff2e0; }
    .nav-right { display: flex; align-items: center; gap: 14px; font-size: 0.9rem; flex-wrap: wrap; }
    .nav-right .user-badge { background: #3f352b; padding: 6px 18px 6px 14px; border-radius: 40px; display: flex; align-items: center; gap: 8px; }
    .nav-right .data-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .nav-right .data-actions button { background: #3f352b; border: none; color: #e8dfd5; padding: 6px 14px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; transition: 0.15s; display: flex; align-items: center; gap: 5px; }
    .nav-right .data-actions button:hover { background: #5f4b38; color: #fff; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }
    .status-dot.online { background: #4CAF50; }
    .status-dot.offline { background: #f44336; }

    .token-bar { background: #f0ebe4; border-radius: 20px; padding: 12px 20px; margin-bottom: 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .token-bar .label { font-weight: 600; color: #3d3229; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
    .token-bar input { flex: 1; min-width: 200px; padding: 8px 16px; border: 2px solid #d8cdbf; border-radius: 40px; font-size: 0.85rem; outline: none; background: white; font-family: monospace; }
    .token-bar input:focus { border-color: #8f735b; }
    .token-bar .token-status { font-size: 0.8rem; color: #6b5d4e; white-space: nowrap; }
    .token-bar .btn-set { background: #2c241c; border: none; color: white; padding: 6px 20px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.15s; }
    .token-bar .btn-set:hover { background: #4d3b2c; }

    /* 页面标题 */
    .page-title { font-size: 1.8rem; font-weight: 700; color: #2a221b; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .page-title i { color: #8f735b; }
    .page-title .sub { font-size: 0.9rem; font-weight: 400; color: #6b5d4e; margin-left: 12px; }

    /* 标签页 */
    .grade-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; border-bottom: 2px solid #e7dfd5; padding-bottom: 12px; }
    .grade-tabs .tab { padding: 8px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: 0.15s; background: #f0ebe4; color: #5f4f3d; border: none; }
    .grade-tabs .tab:hover { background: #e3d9ce; }
    .grade-tabs .tab.active { background: #2c241c; color: #f0ebe3; }

    /* 科目网格 */
    .subject-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 24px; }
    .subject-grid .subj { padding: 10px 14px; border-radius: 16px; cursor: pointer; font-weight: 500; font-size: 0.85rem; transition: 0.15s; background: #f0ebe4; color: #5f4f3d; border: 2px solid transparent; text-align: center; }
    .subject-grid .subj:hover { background: #e3d9ce; }
    .subject-grid .subj.active { background: #8f735b; color: white; border-color: #8f735b; }

    /* 学期タブ */
    .semester-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .semester-tabs .tab { padding: 6px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; font-size: 0.85rem; transition: 0.15s; background: #f0ebe4; color: #5f4f3d; border: none; }
    .semester-tabs .tab:hover { background: #e3d9ce; }
    .semester-tabs .tab.active { background: #2c241c; color: #f0ebe3; }

    /* 考试类型 */
    .exam-type-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 1px solid #e7dfd5; padding-bottom: 12px; }
    .exam-type-tabs .tab { padding: 6px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; font-size: 0.85rem; transition: 0.15s; background: transparent; color: #6b5d4e; border: none; }
    .exam-type-tabs .tab:hover { background: #f0ebe4; }
    .exam-type-tabs .tab.active { background: #f0ebe4; color: #2c241c; font-weight: 600; }

    /* 卡片 */
    .card { background: #fffffffa; border-radius: 28px; padding: 22px 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); border: 1px solid #ede8e0; margin-bottom: 24px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e7dfd5; padding-bottom: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .card-header h2 { font-size: 1.2rem; font-weight: 600; color: #2a221b; display: flex; align-items: center; gap: 10px; }
    .card-header h2 i { color: #8f735b; }

    .btn { background: #2c241c; border: none; color: white; padding: 8px 20px; border-radius: 60px; font-weight: 600; font-size: 0.8rem; cursor: pointer; transition: 0.15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { background: #4d3b2c; transform: scale(0.97); }
    .btn-sm { padding: 4px 14px; font-size: 0.75rem; }
    .btn-outline { background: transparent; color: #2c241c; border: 2px solid #d8cdbf; }
    .btn-outline:hover { background: #f0ebe4; }
    .btn-danger { background: #8f4a4a; }
    .btn-danger:hover { background: #6d3838; }
    .btn-success { background: #3d6b4a; }
    .btn-success:hover { background: #2d5238; }

    /* 考试范围列表 */
    .range-list { list-style: none; padding: 0; }
    .range-list li { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #ede6dd; flex-wrap: wrap; gap: 8px; }
    .range-list li:last-child { border-bottom: 0; }
    .range-list .range-text { font-size: 0.95rem; }
    .range-list .range-meta { font-size: 0.8rem; color: #6b5d4e; }
    .range-list .actions { display: flex; gap: 8px; }
    .range-list .actions button { background: none; border: none; cursor: pointer; color: #8f4a4a; padding: 4px 8px; border-radius: 8px; }
    .range-list .actions button:hover { background: #f5e0e0; }

    /* 练习链接 */
    .practice-links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
    .practice-link { background: #f0ebe4; padding: 10px 18px; border-radius: 16px; display: flex; align-items: center; gap: 10px; text-decoration: none; color: #2c241c; transition: 0.15s; border: 1px solid transparent; }
    .practice-link:hover { border-color: #8f735b; background: #e8dfd5; }
    .practice-link i { color: #8f735b; }
    .practice-link .link-label { font-size: 0.85rem; font-weight: 500; }

    .add-range-area { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
    .add-range-area input[type="text"] { flex: 1; min-width: 200px; padding: 8px 16px; border: 2px solid #d8cdbf; border-radius: 40px; font-size: 0.85rem; outline: none; background: white; }
    .add-range-area input[type="text"]:focus { border-color: #8f735b; }

    .add-link-area { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
    .add-link-area input[type="text"] { flex: 1; min-width: 150px; padding: 8px 16px; border: 2px solid #d8cdbf; border-radius: 40px; font-size: 0.85rem; outline: none; background: white; }
    .add-link-area input[type="url"] { flex: 2; min-width: 200px; padding: 8px 16px; border: 2px solid #d8cdbf; border-radius: 40px; font-size: 0.85rem; outline: none; background: white; }
    .add-link-area input:focus { border-color: #8f735b; }

    .empty-state { text-align: center; padding: 40px 20px; color: #b7a086; }
    .empty-state i { font-size: 2.5rem; margin-bottom: 12px; }

    .toast-msg { background: #2c241c; color: #f0e8de; padding: 6px 18px; border-radius: 60px; font-size: 0.8rem; position: fixed; bottom: 30px; right: 30px; z-index: 999; opacity: 0; transition: 0.2s; }
    .toast-msg.show { opacity: 1; }
    #fileInput { display: none; }

    @media (max-width: 768px) {
      .subject-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
      .grade-tabs .tab { padding: 6px 14px; font-size: 0.8rem; }
      .semester-tabs .tab { padding: 4px 12px; font-size: 0.8rem; }
      .exam-type-tabs .tab { padding: 4px 12px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<div class="app-wrapper">

  <!-- ===== 导航 ===== -->
  <nav class="navbar">
    <div class="nav-brand"><i class="fas fa-compass"></i><span>学び航路</span></div>
    <div class="nav-links">
      <a href="index.html"><i class="fas fa-home"></i> ダッシュボード</a>
      <a href="tetsu.html"><i class="fas fa-flag"></i> 鉄律会</a>
      <a href="sakura.html"><i class="fas fa-cherry-blossom"></i> 桜蔭</a>
      <a href="schedule.html"><i class="fas fa-calendar-alt"></i> 年間予定</a>
      <a class="active" href="exam.html"><i class="fas fa-pencil-alt"></i> 試験</a>
    </div>
    <div class="nav-right">
      <span class="user-badge"><i class="fas fa-user-circle"></i> 中2・山田</span>
      <div class="data-actions">
        <span id="statusInfo"><span class="status-dot offline" id="statusDot"></span><span id="statusText">オフライン</span></span>
        <button onclick="saveExamData()" id="saveBtn"><i class="fas fa-save"></i> 保存</button>
      </div>
    </div>
  </nav>

  <!-- ===== Token 栏 ===== -->
  <div class="token-bar">
    <span class="label"><i class="fab fa-github"></i> Token:</span>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx を入力" autocomplete="off">
    <button class="btn-set" onclick="setTokenFromInput()">設定</button>
    <span class="token-status" id="tokenStatus">🔑 未設定</span>
  </div>

  <!-- ===== 页面标题 ===== -->
  <div class="page-title">
    <i class="fas fa-pencil-alt"></i> 試験管理
    <span class="sub">試験範囲・練習リンク管理</span>
  </div>

  <!-- ===== 学年タブ ===== -->
  <div class="grade-tabs" id="gradeTabs">
    <button class="tab active" data-grade="1">中1</button>
    <button class="tab" data-grade="2">中2</button>
    <button class="tab" data-grade="3">中3</button>
    <button class="tab" data-grade="4">高1</button>
    <button class="tab" data-grade="5">高2</button>
    <button class="tab" data-grade="6">高3</button>
  </div>

  <!-- ===== 科目グリッド ===== -->
  <div class="subject-grid" id="subjectGrid">
    <div class="subj active" data-subject="国語">国語</div>
    <div class="subj" data-subject="文法">文法</div>
    <div class="subj" data-subject="代数">代数</div>
    <div class="subj" data-subject="幾何">幾何</div>
    <div class="subj" data-subject="地理">地理</div>
    <div class="subj" data-subject="歴史">歴史</div>
    <div class="subj" data-subject="公民">公民</div>
    <div class="subj" data-subject="理科1">理科1</div>
    <div class="subj" data-subject="理科2">理科2</div>
    <div class="subj" data-subject="音楽">音楽</div>
    <div class="subj" data-subject="美術">美術</div>
    <div class="subj" data-subject="保健体育">保健体育</div>
    <div class="subj" data-subject="技術・家庭">技術・家庭</div>
    <div class="subj" data-subject="英語">英語</div>
    <div class="subj" data-subject="礼法">礼法</div>
  </div>

  <!-- ===== 学期タブ ===== -->
  <div class="semester-tabs" id="semesterTabs">
    <button class="tab active" data-semester="1">一学期</button>
    <button class="tab" data-semester="2">二学期</button>
    <button class="tab" data-semester="3">三学期</button>
  </div>

  <!-- ===== 考试类型タブ ===== -->
  <div class="exam-type-tabs" id="examTypeTabs">
    <button class="tab active" data-type="middle">中間テスト</button>
    <button class="tab" data-type="regular">定期テスト</button>
    <button class="tab" data-type="final">期末テスト</button>
  </div>

  <!-- ===== コンテンツエリア ===== -->
  <div id="contentArea"></div>

  <div class="toast-msg" id="toast"></div>
</div>

<script>
// ============================================================
// 試験データ
// ============================================================

// データ構造:
// examData[grade][subject][semester][type] = { ranges: [], links: [] }
// grade: '1'~'6', subject: 科目名, semester: '1'|'2'|'3', type: 'middle'|'regular'|'final'

const DEFAULT_EXAM_DATA = {
  '1': {},
  '2': {
    '歴史': {
      '1': {
        'regular': {
          ranges: ['p.36-39 江戸時代の物流・文治政治'],
          links: [
            { label: '📜 中2歴史暗記', url: 'https://xsorainfo.github.io/StudyManager/pages/anki-historyG2-1.html' }
          ]
        }
      }
    }
  },
  '3': {},
  '4': {},
  '5': {},
  '6': {}
};

// ============================================================
// 状態管理
// ============================================================

let currentGrade = '2';
let currentSubject = '国語';
let currentSemester = '1';
let currentType = 'regular';
let examData = {};

function loadExamData() {
  const saved = localStorage.getItem('exam_data');
  if (saved) {
    try {
      examData = JSON.parse(saved);
      // データが空の場合デフォルトをマージ
      for (let g of ['1','2','3','4','5','6']) {
        if (!examData[g]) examData[g] = {};
      }
      // 中2歴史のデフォルトデータをマージ
      if (!examData['2']['歴史']) {
        examData['2']['歴史'] = DEFAULT_EXAM_DATA['2']['歴史'];
      }
      return;
    } catch(e) {}
  }
  examData = JSON.parse(JSON.stringify(DEFAULT_EXAM_DATA));
}

function saveExamData() {
  localStorage.setItem('exam_data', JSON.stringify(examData));
  showToast('💾 試験データを保存しました');
}

// ============================================================
// データ取得
// ============================================================

function getCurrentData() {
  const gradeData = examData[currentGrade] || {};
  const subjectData = gradeData[currentSubject] || {};
  const semesterData = subjectData[currentSemester] || {};
  const typeData = semesterData[currentType] || { ranges: [], links: [] };
  return typeData;
}

function setCurrentData(data) {
  if (!examData[currentGrade]) examData[currentGrade] = {};
  if (!examData[currentGrade][currentSubject]) examData[currentGrade][currentSubject] = {};
  if (!examData[currentGrade][currentSubject][currentSemester]) examData[currentGrade][currentSubject][currentSemester] = {};
  examData[currentGrade][currentSubject][currentSemester][currentType] = data;
  saveExamData();
}

// ============================================================
// レンダリング
// ============================================================

function renderContent() {
  const area = document.getElementById('contentArea');
  const data = getCurrentData();
  const ranges = data.ranges || [];
  const links = data.links || [];

  let html = `
    <div class="card">
      <div class="card-header">
        <h2><i class="fas fa-book"></i> 試験範囲</h2>
        <span class="badge">${ranges.length} 件</span>
      </div>
      ${ranges.length === 0 ? `
        <div class="empty-state">
          <i class="fas fa-plus-circle"></i>
          <p>試験範囲が設定されていません</p>
          <p style="font-size:0.85rem; color:#b7a086;">下の入力欄から追加してください</p>
        </div>
      ` : `
        <ul class="range-list">
          ${ranges.map((r, i) => `
            <li>
              <div>
                <div class="range-text">${r}</div>
              </div>
              <div class="actions">
                <button onclick="deleteRange(${i})"><i class="fas fa-trash"></i></button>
              </div>
            </li>
          `).join('')}
        </ul>
      `}
      <div class="add-range-area">
        <input type="text" id="newRangeInput" placeholder="試験範囲を入力（例: p.36-39）" onkeydown="if(event.key==='Enter') addRange()">
        <button class="btn btn-sm btn-success" onclick="addRange()"><i class="fas fa-plus"></i> 追加</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2><i class="fas fa-link"></i> 練習リンク</h2>
        <span class="badge">${links.length} 件</span>
      </div>
      ${links.length === 0 ? `
        <div class="empty-state" style="padding:20px;">
          <i class="fas fa-plus-circle"></i>
          <p>練習リンクがありません</p>
        </div>
      ` : `
        <div class="practice-links">
          ${links.map((l, i) => `
            <a href="${l.url}" target="_blank" class="practice-link">
              <i class="fas fa-external-link-alt"></i>
              <span class="link-label">${l.label}</span>
              <span onclick="event.preventDefault(); event.stopPropagation(); deleteLink(${i})" style="color:#8f4a4a; cursor:pointer; margin-left:4px;">
                <i class="fas fa-times"></i>
              </span>
            </a>
          `).join('')}
        </div>
      `}
      <div class="add-link-area">
        <input type="text" id="newLinkLabel" placeholder="ラベル（例: 📜 歴史暗記）">
        <input type="url" id="newLinkUrl" placeholder="URL">
        <button class="btn btn-sm btn-success" onclick="addLink()"><i class="fas fa-plus"></i> 追加</button>
      </div>
    </div>
  `;

  area.innerHTML = html;
}

// ============================================================
// 操作関数
// ============================================================

function addRange() {
  const input = document.getElementById('newRangeInput');
  const val = input.value.trim();
  if (!val) { showToast('❌ 試験範囲を入力してください'); return; }
  const data = getCurrentData();
  if (!data.ranges) data.ranges = [];
  data.ranges.push(val);
  setCurrentData(data);
  input.value = '';
  renderContent();
  showToast('✅ 試験範囲を追加しました');
}

function deleteRange(index) {
  if (!confirm('削除しますか？')) return;
  const data = getCurrentData();
  data.ranges.splice(index, 1);
  setCurrentData(data);
  renderContent();
  showToast('🗑️ 削除しました');
}

function addLink() {
  const labelInput = document.getElementById('newLinkLabel');
  const urlInput = document.getElementById('newLinkUrl');
  const label = labelInput.value.trim();
  const url = urlInput.value.trim();
  if (!label || !url) { showToast('❌ ラベルとURLを入力してください'); return; }
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    showToast('❌ URLは http:// または https:// で始めてください');
    return;
  }
  const data = getCurrentData();
  if (!data.links) data.links = [];
  data.links.push({ label, url });
  setCurrentData(data);
  labelInput.value = '';
  urlInput.value = '';
  renderContent();
  showToast('✅ 練習リンクを追加しました');
}

function deleteLink(index) {
  if (!confirm('削除しますか？')) return;
  const data = getCurrentData();
  data.links.splice(index, 1);
  setCurrentData(data);
  renderContent();
  showToast('🗑️ 削除しました');
}

// ============================================================
// イベントハンドラ
// ============================================================

document.addEventListener('DOMContentLoaded', function() {
  loadExamData();

  // 学年タブ
  document.querySelectorAll('#gradeTabs .tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('#gradeTabs .tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentGrade = this.dataset.grade;
      renderContent();
    });
  });

  // 科目
  document.querySelectorAll('.subj').forEach(el => {
    el.addEventListener('click', function() {
      document.querySelectorAll('.subj').forEach(s => s.classList.remove('active'));
      this.classList.add('active');
      currentSubject = this.dataset.subject;
      renderContent();
    });
  });

  // 学期
  document.querySelectorAll('#semesterTabs .tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('#semesterTabs .tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentSemester = this.dataset.semester;
      renderContent();
    });
  });

  // 考试类型
  document.querySelectorAll('#examTypeTabs .tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('#examTypeTabs .tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentType = this.dataset.type;
      renderContent();
    });
  });

  // Token関連
  updateStatus();
  renderContent();

  document.getElementById('tokenInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') setTokenFromInput();
  });
});

// ============================================================
// Token 管理（共通）
// ============================================================

function getToken() {
  return localStorage.getItem('github_token') || '';
}

function setTokenFromInput() {
  const input = document.getElementById('tokenInput');
  if (!input) return;
  const token = input.value.trim();
  if (!token) { showToast('❌ Token を入力してください'); return; }
  if (!token.startsWith('ghp_')) { showToast('❌ Token は ghp_ で始まる必要があります'); return; }
  localStorage.setItem('github_token', token);
  input.value = '';
  updateStatus();
  showToast('✅ Token を設定しました');
}

function updateStatus() {
  const token = getToken();
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const status = document.getElementById('tokenStatus');
  if (token) {
    if (dot) dot.className = 'status-dot online';
    if (text) text.textContent = 'オンライン';
    if (status) status.textContent = '✅ ' + token.substring(0, 8) + '...';
  } else {
    if (dot) dot.className = 'status-dot offline';
    if (text) text.textContent = 'オフライン';
    if (status) status.textContent = '🔑 未設定';
  }
}

function showToast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 3000);
}

// グローバル公開
window.addRange = addRange;
window.deleteRange = deleteRange;
window.addLink = addLink;
window.deleteLink = deleteLink;
window.saveExamData = saveExamData;
window.setTokenFromInput = setTokenFromInput;
</script>
