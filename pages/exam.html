<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ★ iPad/iPhone ホーム画面アイコン（最重要） ★ -->
  <link rel="apple-touch-icon" sizes="180x180" href="/StudyManager/apple-touch-icon.png">
  
  <!-- ★ 通常のファビコン ★ -->
  <link rel="icon" type="image/png" href="/StudyManager/favicon.png">
  
  <title>試験</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Helvetica Neue', 'Noto Sans JP', system-ui, sans-serif; }
    body { background: #f5f2ec; color: #1e1a16; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .app-wrapper { max-width: 1400px; width: 100%; background: #fcf9f5; border-radius: 40px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); padding: 24px 30px 40px; }

    .navbar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: #2c241c; padding: 10px 24px; border-radius: 60px; margin-bottom: 20px; color: #f0ebe3; }
    .nav-brand { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 1.25rem; }
    .nav-brand i { color: #e3c9a6; font-size: 1.6rem; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 6px 16px; font-weight: 500; }
    .nav-links a { color: #e8dfd5; text-decoration: none; padding: 6px 12px; border-radius: 40px; transition: 0.15s; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; }
    .nav-links a:hover { background: #3f352b; color: #fff; }
    .nav-links a.active { background: #5f4b38; color: #fff2e0; }
    .nav-right { display: flex; align-items: center; gap: 14px; font-size: 0.9rem; flex-wrap: wrap; }
    .nav-right .user-badge { background: #3f352b; padding: 6px 18px 6px 14px; border-radius: 40px; display: flex; align-items: center; gap: 8px; }
    .nav-right .data-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .nav-right .data-actions button { background: #3f352b; border: none; color: #e8dfd5; padding: 6px 14px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; transition: 0.15s; display: flex; align-items: center; gap: 5px; }
    .nav-right .data-actions button:hover { background: #5f4b38; color: #fff; }
    .nav-right .data-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }
    .status-dot.online { background: #4CAF50; }
    .status-dot.offline { background: #f44336; }
    .status-dot.saving { background: #ff9800; animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .token-bar { background: #f0ebe4; border-radius: 20px; padding: 12px 20px; margin-bottom: 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .token-bar .label { font-weight: 600; color: #3d3229; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
    .token-bar input { flex: 1; min-width: 200px; padding: 8px 16px; border: 2px solid #d8cdbf; border-radius: 40px; font-size: 0.85rem; outline: none; background: white; font-family: monospace; }
    .token-bar input:focus { border-color: #8f735b; }
    .token-bar .token-status { font-size: 0.8rem; color: #6b5d4e; white-space: nowrap; }
    .token-bar .btn-set { background: #2c241c; border: none; color: white; padding: 6px 20px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.15s; }
    .token-bar .btn-set:hover { background: #4d3b2c; }

    .page-title { font-size: 1.8rem; font-weight: 700; color: #2a221b; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .page-title i { color: #8f735b; }
    .page-title .sub { font-size: 0.9rem; font-weight: 400; color: #6b5d4e; margin-left: 12px; }

    .grade-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; border-bottom: 2px solid #e7dfd5; padding-bottom: 12px; }
    .grade-tabs .tab { padding: 8px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: 0.15s; background: #f0ebe4; color: #5f4f3d; border: none; }
    .grade-tabs .tab:hover { background: #e3d9ce; }
    .grade-tabs .tab.active { background: #2c241c; color: #f0ebe3; }

    .semester-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .semester-tabs .tab { padding: 6px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; font-size: 0.85rem; transition: 0.15s; background: #f0ebe4; color: #5f4f3d; border: none; }
    .semester-tabs .tab:hover { background: #e3d9ce; }
    .semester-tabs .tab.active { background: #2c241c; color: #f0ebe3; }

    .exam-type-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 1px solid #e7dfd5; padding-bottom: 12px; }
    .exam-type-tabs .tab { padding: 6px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; font-size: 0.85rem; transition: 0.15s; background: transparent; color: #6b5d4e; border: none; }
    .exam-type-tabs .tab:hover { background: #f0ebe4; }
    .exam-type-tabs .tab.active { background: #f0ebe4; color: #2c241c; font-weight: 600; }

    .card { background: #fffffffa; border-radius: 28px; padding: 22px 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); border: 1px solid #ede8e0; margin-bottom: 24px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e7dfd5; padding-bottom: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .card-header h2 { font-size: 1.2rem; font-weight: 600; color: #2a221b; display: flex; align-items: center; gap: 10px; }

    .add-area select {

    }

    .add-area textarea {

    .practice-links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }

    .practice-link:hover { border-color: #8f735b; background: #e8dfd5; }

    .add-link-area { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
    .add-link-area select {
      padding: 8px 16px;
      border: 2px solid #d8cdbf;

      font-size: 0.85rem;

    }
    .add-link-area select:focus { border-color: #8f735b; }
    .add-link-area input[type="text"],
    .add-link-area input[type="url"] { 
      padding: 8px 16px;

    .add-link-area input[type="text"] { flex: 1; }

    .empty-state { text-align: center; padding: 40px 20px; color: #b7a086; }
    .empty-state i { font-size: 2.5rem; margin-bottom: 12px; }

    .toast-msg { background: #2c241c; color: #f0e8de; padding: 6px 18px; border-radius: 60px; font-size: 0.8rem; position: fixed; bottom: 30px; right: 30px; z-index: 999; opacity: 0; transition: 0.2s; }
    .toast-msg.show { opacity: 1; }
    #fileInput { display: none; }

    @media (max-width: 768px) {
      .grade-tabs .tab { padding: 6px 14px; font-size: 0.8rem; }
      .semester-tabs .tab { padding: 4px 12px; font-size: 0.8rem; }
      .exam-type-tabs .tab { padding: 4px 12px; font-size: 0.75rem; }
      .add-area textarea { min-width: 100px; min-height: 60px; }
      .add-area select { min-width: 100px; }

    /* 学科ごとのカード（折りたたみ対応） */

      background: #fcf9f4; 
      border-radius: 20px;

    .subject-card .subject-title {

    }
    .subject-card .subject-title .toggle-icon {

      display: flex;

      background: #e3d9ce;
    }
    .subject-card .subject-title .toggle-icon.open {
      background: #8f735b;

<body>

<div class="app-wrapper">
  <!-- 导航コンテナ（共通JSで自動生成） -->
  <div id="navbarContainer"></div>
  <div id="tokenBarContainer"></div>
  

  <!-- ===== 页面标题 ===== -->
  <div class="page-title">
    <i class="fas fa-pencil-alt"></i> 試験管理
    <span class="sub">試験範囲・練習リンク管理</span>
  </div>

  <!-- ===== 学年タブ ===== -->
  <div class="grade-tabs" id="gradeTabs">
    <button class="tab" data-grade="1">中1</button>
    <button class="tab active" data-grade="2">中2</button>
    <button class="tab" data-grade="3">中3</button>
    <button class="tab" data-grade="4">高1</button>
    <button class="tab" data-grade="5">高2</button>
    <button class="tab" data-grade="6">高3</button>
  </div>

  <!-- ===== 学期タブ ===== -->
  <div class="semester-tabs" id="semesterTabs">
    <button class="tab active" data-semester="1">一学期</button>
    <button class="tab" data-semester="2">二学期</button>
    <button class="tab" data-semester="3">三学期</button>
  </div>

  <!-- ===== 考试类型タブ ===== -->
  <div class="exam-type-tabs" id="examTypeTabs">
    <button class="tab" data-type="middle">中間テスト</button>
    <button class="tab active" data-type="regular">定期テスト</button>
    <button class="tab" data-type="final">期末テスト</button>
  </div>

  <!-- ===== コンテンツエリア ===== -->
  <div id="contentArea"></div>

  <div class="toast-msg" id="toast"></div>
</div>

<script>
  // ============================================================
  // 🔧 データボタン表示設定
  // ============================================================
  window.SHOW_EXPORT = false;
  window.SHOW_IMPORT = false;
  // ============================================================
</script>
<script src="../scripts/common.js"></script>
<script>
// ============================================================
// 🔧 デフォルト設定（ここを編集してください）
// ============================================================
const DEFAULT_GRADE = '2';
const DEFAULT_SEMESTER = '1';
const DEFAULT_EXAM_TYPE = 'regular';
// ============================================================

// ============================================================
// 設定
// ============================================================
const GITHUB_OWNER = 'xsorainfo';
const GITHUB_REPO = 'StudyManager';
const GITHUB_PATH = 'data/exam_data.json';
const GITHUB_BRANCH = 'main';

// 全科目リスト
const ALL_SUBJECTS = ['国語', '文法', '代数', '幾何', '英語', '英語ｻｲﾄﾞﾘｰﾀﾞ', '地理', '歴史', '理科1', '理科2', '音楽', '美術', '技術・家庭', '保健体育', '礼法', '公民'];

// ============================================================
// 試験データ
// ============================================================

const DEFAULT_EXAM_DATA = {
  '1': {},
  '2': {
    '歴史': {
      '1': {
        'regular': {
          ranges: ['p.36-39 江戸時代の物流・文治政治'],
          links: [
            { label: '📜 中2歴史暗記', url: 'https://xsorainfo.github.io/StudyManager/pages/anki-historyG2-1.html' }
          ]
        }
      }
    }
  },
  '3': {},
  '4': {},
  '5': {},
  '6': {}
};

// ============================================================
// 状態管理
// ============================================================

let currentGrade = DEFAULT_GRADE;
let currentSemester = DEFAULT_SEMESTER;
let currentType = DEFAULT_EXAM_TYPE;
let examData = {};
let subjectStates = {};

function loadExamData() {
  const saved = localStorage.getItem('exam_data');
  if (saved) {
    try {
      examData = JSON.parse(saved);
      for (let g of ['1','2','3','4','5','6']) {
        if (!examData[g]) examData[g] = {};
      }
      if (!examData['2']['歴史']) {
        examData['2']['歴史'] = DEFAULT_EXAM_DATA['2']['歴史'];
      }
      return;
    } catch(e) {}
  }
  examData = JSON.parse(JSON.stringify(DEFAULT_EXAM_DATA));
}

function saveExamData() {
  localStorage.setItem('exam_data', JSON.stringify(examData));
  showToast('💾 ローカルに保存しました');
}

// ============================================================
// GitHub 保存・読込
// ============================================================

function getHeaders() {
  const token = getToken();
  if (!token) return null;
  return {
    'Authorization': `token ${token}`,
    'Accept': 'application/vnd.github.v3+json'
  };
}

async function saveToGitHub() {
  const token = getToken();
  if (!token) {
    showToast('❌ Token が設定されていません');
    return;
  }

  saveExamData();

  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = 'status-dot saving';
  text.textContent = '保存中...';

  try {
    const content = JSON.stringify(examData, null, 2);
    const encoded = btoa(unescape(encodeURIComponent(content)));
    const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`;
    const headers = getHeaders();

    let sha = null;
    const checkRes = await fetch(url, { headers });
    if (checkRes.ok) {
      const fileData = await checkRes.json();
      sha = fileData.sha;
    }

    const body = {
      message: `📝 試験データ更新: ${new Date().toISOString()}`,
      content: encoded,
      branch: GITHUB_BRANCH
    };
    if (sha) body.sha = sha;

    const response = await fetch(url, {
      method: 'PUT',
      headers: headers,
      body: JSON.stringify(body)
    });

    if (response.ok) {
      dot.className = 'status-dot online';
      text.textContent = 'オンライン';
      showToast('✅ GitHub に保存しました');
    } else {
      const err = await response.json();
      throw new Error(err.message || `HTTP ${response.status}`);
    }
  } catch(e) {
    dot.className = 'status-dot offline';
    text.textContent = 'エラー';
    showToast('❌ 保存失敗: ' + e.message);
  }
}

async function loadFromGitHub() {
  const token = getToken();
  if (!token) {
    showToast('❌ Token が設定されていません');
    return;
  }

  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = 'status-dot saving';
  text.textContent = '読込中...';

  try {
    const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`;
    const headers = getHeaders();
    const response = await fetch(url, { headers });

    if (response.status === 404) {
      showToast('📭 GitHub にデータがありません');
      dot.className = 'status-dot online';
      text.textContent = 'オンライン';
      return;
    }
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const fileData = await response.json();
    const content = decodeURIComponent(escape(atob(fileData.content)));
    const loadedData = JSON.parse(content);

    const keys = ['1','2','3','4','5','6'];
    for (let key of keys) {
      if (!loadedData[key]) loadedData[key] = {};
    }

    examData = loadedData;
    localStorage.setItem('exam_data', JSON.stringify(examData));

    dot.className = 'status-dot online';
    text.textContent = 'オンライン';
    renderContent();
    showToast('✅ GitHub から読み込みました');
  } catch(e) {
    dot.className = 'status-dot offline';
    text.textContent = 'エラー';
    showToast('❌ 読込失敗: ' + e.message);
  }
}

// ============================================================
// インポート/エクスポート（JSONファイル）
// ============================================================

function exportData() {
  const blob = new Blob([JSON.stringify(examData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `exam_data_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('📁 エクスポートしました');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      const keys = ['1','2','3','4','5','6'];
      for (let key of keys) {
        if (!imported[key]) imported[key] = {};
      }
      if (confirm('現在のデータをインポートデータで上書きしますか？')) {
        examData = imported;
        localStorage.setItem('exam_data', JSON.stringify(examData));
        renderContent();
        showToast('📁 インポートしました');
      }
    } catch(err) {
      showToast('❌ ファイル読み込み失敗');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ============================================================
// データ取得
// ============================================================

function getSubjectData(subject) {
  const gradeData = examData[currentGrade] || {};
  const subjectData = gradeData[subject] || {};
  const semesterData = subjectData[currentSemester] || {};
  const typeData = semesterData[currentType] || { ranges: [], links: [] };
  return typeData;
}

function setSubjectData(subject, data) {
  if (!examData[currentGrade]) examData[currentGrade] = {};
  if (!examData[currentGrade][subject]) examData[currentGrade][subject] = {};
  if (!examData[currentGrade][subject][currentSemester]) examData[currentGrade][subject][currentSemester] = {};
  examData[currentGrade][subject][currentSemester][currentType] = data;
  saveExamData();
}
// ============================================================
// 📊 成績データ管理（定期テスト用）
// ============================================================

// 成績データのキー
const SCORE_STORAGE_KEY = 'exam_scores';

// 成績データを取得
function getScoresForCurrentPeriod() {
  const allScores = JSON.parse(localStorage.getItem(SCORE_STORAGE_KEY) || '[]');
  // 現在の学年・学期・テスト種別でフィルタリング
  const key = `${currentGrade}_${currentSemester}_${currentType}`;
  return allScores.filter(s => s.key === key);
}

// 成績データを保存
function saveScoresForCurrentPeriod(scores) {
  const allScores = JSON.parse(localStorage.getItem(SCORE_STORAGE_KEY) || '[]');
  const key = `${currentGrade}_${currentSemester}_${currentType}`;
  // 同じキーのデータを削除して新しいデータを追加
  const filtered = allScores.filter(s => s.key !== key);
  const newData = scores.map(s => ({ ...s, key }));
  localStorage.setItem(SCORE_STORAGE_KEY, JSON.stringify([...filtered, ...newData]));
  showToast('✅ 成績を保存しました');
  renderContent(); // 再描画
}

// 成績を追加
function addScore() {
  const subject = document.getElementById('scoreSubject').value;
  const score = parseInt(document.getElementById('scoreScore').value);
  const total = parseInt(document.getElementById('scoreTotal').value) || null;
  const avg = parseFloat(document.getElementById('scoreAvg').value) || null;
  const deviation = parseFloat(document.getElementById('scoreDev').value) || null;
  const note = document.getElementById('scoreNote').value.trim() || '';
  
  if (!subject || isNaN(score) || score < 0 || score > 100) {
    showToast('❌ 科目と得点（0-100）を入力してください');
    return;
  }
  
  const scores = getScoresForCurrentPeriod();
  scores.push({ subject, score, total, avg, deviation, note });
  saveScoresForCurrentPeriod(scores);
  
  // 入力欄をクリア
  document.getElementById('scoreScore').value = '';
  document.getElementById('scoreTotal').value = '';
  document.getElementById('scoreAvg').value = '';
  document.getElementById('scoreDev').value = '';
  document.getElementById('scoreNote').value = '';
}

// 成績を削除
function deleteScore(index) {
  if (!confirm('この成績を削除しますか？')) return;
  const scores = getScoresForCurrentPeriod();
  scores.splice(index, 1);
  saveScoresForCurrentPeriod(scores);
}

// 折りたたみ関数
// ============================================================

function toggleSubject(id) {
  const body = document.getElementById(id + '_body');
  const icon = document.getElementById(id + '_icon');
  if (!body) return;
  if (body.style.display === 'none') {
    body.style.display = '';
    if (icon) {
      icon.className = 'toggle-icon open';
      icon.innerHTML = '<i class="fas fa-minus"></i>';
    }
  } else {
    body.style.display = 'none';
    if (icon) {
      icon.className = 'toggle-icon';
      icon.innerHTML = '<i class="fas fa-plus"></i>';
    }
  }
}

      <div style="margin-bottom:12px;">
        <label style="font-weight:500; font-size:0.85rem; color:#3d3229; display:block; margin-bottom:4px;">📚 学科を選択</label>
        <select id="addSubjectSelect" style="padding:8px 16px; border:2px solid #d8cdbf; border-radius:16px; font-size:0.9rem; outline:none; background:white; width:100%; max-width:300px;">
          ${ALL_SUBJECTS.map(s => `<option value="${s}">${s}</option>`).join('')}
        </select>
      </div>

      <div class="add-area">
        <textarea id="newRangeInput" placeholder="試験範囲を入力（Shift+Enter で改行、Enter で送信）"></textarea>
        <div class="add-btn-group">
          <button class="btn btn-sm btn-success" onclick="addRangeWithSubject()"><i class="fas fa-plus"></i> 範囲追加</button>
          <span class="hint">Shift+Enter 改行</span>
        </div>
      </div>

      <div class="add-link-area" style="margin-top:12px;">
        <input type="text" id="newLinkLabel" placeholder="ラベル（例: 📜 歴史暗記）" style="flex:1;">
        <input type="url" id="newLinkUrl" placeholder="URL" style="flex:2;">
        <button class="btn btn-sm btn-success" onclick="addLinkWithSubject()"><i class="fas fa-plus"></i> リンク追加</button>
      </div>
    </div>
  `;

  if (hasData) {
    html += `
      <div style="margin-top:16px; font-size:0.85rem; color:#6b5d4e; text-align:right; border-top:1px solid #ede6dd; padding-top:12px;">
        総計: 試験範囲 <strong>${totalRanges}</strong> 件 ｜ リンク <strong>${totalLinks}</strong> 件
      </div>
    `;
  }

  area.innerHTML = html;

  const rangeInput = document.getElementById('newRangeInput');
  if (rangeInput) {
    rangeInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        addRangeWithSubject();
      }
    });
  }

  const labelInput = document.getElementById('newLinkLabel');
  const urlInput = document.getElementById('newLinkUrl');
  if (labelInput && urlInput) {
    const doAddLink = function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        addLinkWithSubject();
      }
    };
    labelInput.addEventListener('keydown', doAddLink);
    urlInput.addEventListener('keydown', doAddLink);
  }
}

// ============================================================
// 🗓️ 時間割・提出物 折りたたみ関数（一体型）
// ============================================================

function toggleSchedule() {
  const body = document.getElementById('schedule_submit_body');
  const icon = document.getElementById('schedule_submit_icon');
  if (!body) return;
  
  if (body.style.display === 'none' || body.style.display === '') {
    body.style.display = 'block';
    if (icon) {
      icon.innerHTML = '<i class="fas fa-minus"></i>';
    }
  } else {
    body.style.display = 'none';
    if (icon) {
      icon.innerHTML = '<i class="fas fa-plus"></i>';
    }
  }
}
// ============================================================
// 📊 成績編集機能
// ============================================================

// 編集モードに切り替え
function editScore(index) {
  // 表示行を隠す
  const viewRow = document.getElementById(`score_row_${index}`);
  if (viewRow) viewRow.style.display = 'none';
  
  // 編集行を表示
  const editRow = document.getElementById(`score_edit_${index}`);
  if (editRow) editRow.style.display = 'table-row';
}

// 編集をキャンセル
function cancelEdit(index) {
  // 表示行を再表示
  const viewRow = document.getElementById(`score_row_${index}`);
  if (viewRow) viewRow.style.display = 'table-row';
  
  // 編集行を隠す
  const editRow = document.getElementById(`score_edit_${index}`);
  if (editRow) editRow.style.display = 'none';
}

// 編集を保存
function saveEdit(index) {
  const subject = document.getElementById(`edit_subject_${index}`)?.value;
  const score = parseInt(document.getElementById(`edit_score_${index}`)?.value);
  const total = parseInt(document.getElementById(`edit_total_${index}`)?.value) || null;
  const avg = parseFloat(document.getElementById(`edit_avg_${index}`)?.value) || null;
  const deviation = parseFloat(document.getElementById(`edit_dev_${index}`)?.value) || null;
  const note = document.getElementById(`edit_note_${index}`)?.value.trim() || '';
  
  if (!subject || isNaN(score) || score < 0 || score > 100) {
    showToast('❌ 科目と得点（0-100）を入力してください');
    return;
  }
  
  const scores = getScoresForCurrentPeriod();
  if (index >= scores.length) {
    showToast('❌ データが見つかりません');
    return;
  }
  
  // データを更新
  scores[index] = { subject, score, total, avg, deviation, note };
  saveScoresForCurrentPeriod(scores);
  
  // 編集モードを解除
  cancelEdit(index);
  showToast('✅ 成績を更新しました');
}
// ============================================================
// 操作関数
// ============================================================

function getSelectedSubject() {
  const select = document.getElementById('addSubjectSelect');
  return select ? select.value : '歴史';
}

function addRangeWithSubject() {
  const input = document.getElementById('newRangeInput');
  if (!input) return;
  const val = input.value.trim();
  if (!val) { showToast('❌ 試験範囲を入力してください'); return; }
  const subject = getSelectedSubject();
  const data = getSubjectData(subject);
  if (!data.ranges) data.ranges = [];
  data.ranges.push(val);
  setSubjectData(subject, data);
  input.value = '';
  renderContent();
  showToast(`✅ ${subject} に試験範囲を追加しました`);
}

function deleteRange(subject, index) {
  if (!confirm(`「${subject}」の試験範囲を削除しますか？`)) return;
  const data = getSubjectData(subject);
  data.ranges.splice(index, 1);
  setSubjectData(subject, data);
  renderContent();
  showToast('🗑️ 削除しました');
}

function addLinkWithSubject() {
  const labelInput = document.getElementById('newLinkLabel');
  const urlInput = document.getElementById('newLinkUrl');
  if (!labelInput || !urlInput) return;
  const label = labelInput.value.trim();
  const url = urlInput.value.trim();
  if (!label || !url) { showToast('❌ ラベルとURLを入力してください'); return; }
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    showToast('❌ URLは http:// または https:// で始めてください');
    return;
  }
  const subject = getSelectedSubject();
  const data = getSubjectData(subject);
  if (!data.links) data.links = [];
  data.links.push({ label, url });
  setSubjectData(subject, data);
  labelInput.value = '';
  urlInput.value = '';
  renderContent();
  showToast(`✅ ${subject} に練習リンクを追加しました`);
}

function deleteLink(subject, index) {
  if (!confirm(`「${subject}」のリンクを削除しますか？`)) return;
  const data = getSubjectData(subject);
  data.links.splice(index, 1);
  setSubjectData(subject, data);
  renderContent();
  showToast('🗑️ 削除しました');
}

function applyDefaultTabs() {
  document.querySelectorAll('#gradeTabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.grade === DEFAULT_GRADE);
  });
  document.querySelectorAll('#semesterTabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.semester === DEFAULT_SEMESTER);
  });
  document.querySelectorAll('#examTypeTabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.type === DEFAULT_EXAM_TYPE);
  });
}

// ============================================================
// イベントハンドラ
// ============================================================

document.addEventListener('DOMContentLoaded', function() {
  loadExamData();
  applyDefaultTabs();

  document.querySelectorAll('#gradeTabs .tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('#gradeTabs .tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentGrade = this.dataset.grade;
      renderContent();
    });
  });

  document.querySelectorAll('#semesterTabs .tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('#semesterTabs .tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentSemester = this.dataset.semester;
      renderContent();
    });
  });

  document.querySelectorAll('#examTypeTabs .tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('#examTypeTabs .tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentType = this.dataset.type;
      renderContent();
    });
  });

  renderContent();

  // tokenInput は common.js で処理されるので、ここでは不要
});

window.deleteRange = deleteRange;
window.addLinkWithSubject = addLinkWithSubject;

window.saveToGitHub = saveToGitHub;
window.loadFromGitHub = loadFromGitHub;
window.exportData = exportData;
window.importData = importData;
window.toggleSubject = toggleSubject;
</script>
