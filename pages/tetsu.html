<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/StudyManager/favicon.png">
  <title>鉄律会</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Helvetica Neue', 'Noto Sans JP', system-ui, sans-serif; }
    body { background: #f5f2ec; color: #1e1a16; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .app-wrapper { max-width: 1400px; width: 100%; background: #fcf9f5; border-radius: 40px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); padding: 24px 30px 40px; }

    /* 导航 */
    .navbar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: #2c241c; padding: 10px 24px; border-radius: 60px; margin-bottom: 20px; color: #f0ebe3; }
    .nav-brand { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 1.25rem; }
    .nav-brand i { color: #e3c9a6; font-size: 1.6rem; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 6px 16px; font-weight: 500; }
    .nav-links a { color: #e8dfd5; text-decoration: none; padding: 6px 12px; border-radius: 40px; transition: 0.15s; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; }
    .nav-links a:hover { background: #3f352b; color: #fff; }
    .nav-links a.active { background: #5f4b38; color: #fff2e0; }
    .nav-right { display: flex; align-items: center; gap: 14px; font-size: 0.9rem; flex-wrap: wrap; }
    .nav-right .user-badge { background: #3f352b; padding: 6px 18px 6px 14px; border-radius: 40px; display: flex; align-items: center; gap: 8px; }
    .nav-right .data-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .nav-right .data-actions button { background: #3f352b; border: none; color: #e8dfd5; padding: 6px 14px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; transition: 0.15s; display: flex; align-items: center; gap: 5px; }
    .nav-right .data-actions button:hover { background: #5f4b38; color: #fff; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }
    .status-dot.online { background: #4CAF50; }
    .status-dot.offline { background: #f44336; }

    .token-bar { background: #f0ebe4; border-radius: 20px; padding: 12px 20px; margin-bottom: 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .token-bar .label { font-weight: 600; color: #3d3229; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
    .token-bar input { flex: 1; min-width: 200px; padding: 8px 16px; border: 2px solid #d8cdbf; border-radius: 40px; font-size: 0.85rem; outline: none; background: white; font-family: monospace; }
    .token-bar input:focus { border-color: #8f735b; }
    .token-bar .token-status { font-size: 0.8rem; color: #6b5d4e; white-space: nowrap; }
    .token-bar .btn-set { background: #2c241c; border: none; color: white; padding: 6px 20px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.15s; }
    .token-bar .btn-set:hover { background: #4d3b2c; }

    /* 页面标题 */
    .page-title { font-size: 1.8rem; font-weight: 700; color: #2a221b; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .page-title i { color: #8f735b; }
    .page-title .sub { font-size: 0.9rem; font-weight: 400; color: #6b5d4e; margin-left: 12px; }

    /* ===== 学年タブ ===== */
    .grade-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; border-bottom: 2px solid #e7dfd5; padding-bottom: 12px; }
    .grade-tabs .tab { padding: 8px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: 0.15s; background: #f0ebe4; color: #5f4f3d; border: none; }
    .grade-tabs .tab:hover { background: #e3d9ce; }
    .grade-tabs .tab.active { background: #2c241c; color: #f0ebe3; }

    /* ===== 科目タブ ===== */
    .subject-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .subject-tabs .tab { padding: 6px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; font-size: 0.9rem; transition: 0.15s; background: #f0ebe4; color: #5f4f3d; border: none; }
    .subject-tabs .tab:hover { background: #e3d9ce; }
    .subject-tabs .tab.active { background: #8f735b; color: white; }

    /* ===== 機能タブ ===== */
    .func-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 1px solid #e7dfd5; padding-bottom: 12px; }
    .func-tabs .tab { padding: 6px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; font-size: 0.85rem; transition: 0.15s; background: transparent; color: #6b5d4e; border: none; }
    .func-tabs .tab:hover { background: #f0ebe4; }
    .func-tabs .tab.active { background: #f0ebe4; color: #2c241c; font-weight: 600; }

    /* ===== カリキュラム表 ===== */
    .curriculum-table-wrap { overflow-x: auto; }
    .curriculum-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 700px; }
    .curriculum-table th { background: #2c241c; color: #f0ebe3; padding: 10px 14px; text-align: left; font-weight: 600; }
    .curriculum-table td { padding: 8px 14px; border-bottom: 1px solid #ede6dd; }
    .curriculum-table tr:hover { background: #f8f4ef; }
    .curriculum-table .test { background: #f0ebe4; font-weight: 500; color: #8f4a4a; }
    .curriculum-table .holiday { background: #f5f0e8; color: #b7a086; font-style: italic; }
    .curriculum-table .double { font-size: 0.7rem; color: #8f735b; }

    /* ===== テスト一覧 ===== */
    .test-list { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .test-item { background: #f6f1ea; border-radius: 16px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    .test-item .name { font-weight: 500; }
    .test-item .date { font-size: 0.8rem; color: #6b5d4e; }
    .test-item .status { font-size: 0.8rem; padding: 2px 14px; border-radius: 40px; }
    .test-item .status.done { background: #c8e6c9; color: #2e7d32; }
    .test-item .status.pending { background: #fff3e0; color: #e65100; }
    .test-item .status.upcoming { background: #e3f2fd; color: #0d47a1; }
    .test-item .score-info { font-size: 0.85rem; color: #2c241c; margin-top: 4px; }
    .test-item .score-info .num { font-weight: 700; font-size: 1rem; }
    .test-item .score-info .avg { color: #6b5d4e; margin-left: 8px; }
    .test-item .score-info .dev { color: #8f4a4a; margin-left: 8px; font-weight: 600; }
    .test-item .note { font-size: 0.75rem; color: #8f735b; margin-top: 2px; }

    /* ===== 空き状態 ===== */
    .empty-state { text-align: center; padding: 60px 20px; color: #b7a086; }
    .empty-state i { font-size: 3rem; margin-bottom: 16px; }
    .empty-state p { font-size: 1.1rem; }

    .toast-msg { background: #2c241c; color: #f0e8de; padding: 6px 18px; border-radius: 60px; font-size: 0.8rem; position: fixed; bottom: 30px; right: 30px; z-index: 999; opacity: 0; transition: 0.2s; }
    .toast-msg.show { opacity: 1; }
    #fileInput { display: none; }
    .flex { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    /* 偏差値の色分け */
    .dev-high { color: #c62828; font-weight: 700; }
    .dev-mid { color: #e65100; font-weight: 600; }
    .dev-low { color: #0d47a1; font-weight: 500; }
    .dev-avg { color: #2e7d32; font-weight: 500; }

    @media (max-width: 768px) {
      .test-list { grid-template-columns: 1fr; }
      .grade-tabs .tab { padding: 6px 16px; font-size: 0.8rem; }
      .subject-tabs .tab { padding: 4px 14px; font-size: 0.8rem; }
      .func-tabs .tab { padding: 4px 14px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<div class="app-wrapper">

  <!-- ===== 导航 ===== -->
  <nav class="navbar">
    <div class="nav-brand"><i class="fas fa-compass"></i><span>学び航路</span></div>
    <div class="nav-links">
      <a href="index.html"><i class="fas fa-home"></i> ダッシュボード</a>
      <a class="active" href="tetsu.html"><i class="fas fa-flag"></i> 鉄律会</a>
      <a href="sakura.html"><i class="fas fa-cherry-blossom"></i> 桜蔭</a>
      <a href="schedule.html"><i class="fas fa-calendar-alt"></i> 年間予定</a>
      <a href="exam.html"><i class="fas fa-pencil-alt"></i> 試験</a>
    </div>
    <div class="nav-right">
      <span class="user-badge"><i class="fas fa-user-circle"></i> 中2・山田</span>
      <div class="data-actions">
        <span id="statusInfo"><span class="status-dot offline" id="statusDot"></span><span id="statusText">オフライン</span></span>
        <button onclick="saveToGitHub()" id="saveBtn" disabled><i class="fab fa-github"></i> 保存</button>
        <button onclick="loadFromGitHub()" id="loadBtn" disabled><i class="fas fa-download"></i> 読込</button>
        <button onclick="exportData()"><i class="fas fa-file-export"></i></button>
        <button onclick="document.getElementById('fileInput').click()"><i class="fas fa-file-import"></i></button>
        <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
      </div>
    </div>
  </nav>

  <!-- ===== Token 栏 ===== -->
  <div class="token-bar">
    <span class="label"><i class="fab fa-github"></i> Token:</span>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx を入力" autocomplete="off">
    <button class="btn-set" onclick="setTokenFromInput()">設定</button>
    <span class="token-status" id="tokenStatus">🔑 未設定</span>
  </div>

  <!-- ===== 页面标题 ===== -->
  <div class="page-title">
    <i class="fas fa-flag"></i> 鉄律会
    <span class="sub">学習カリキュラム・テスト管理</span>
  </div>

  <!-- ===== 学年タブ ===== -->
  <div class="grade-tabs" id="gradeTabs">
    <button class="tab active" data-grade="1">中1</button>
    <button class="tab" data-grade="2">中2</button>
    <button class="tab" data-grade="3">中3</button>
    <button class="tab" data-grade="4">高1</button>
    <button class="tab" data-grade="5">高2</button>
    <button class="tab" data-grade="6">高3</button>
  </div>

  <!-- ===== 科目タブ ===== -->
  <div class="subject-tabs" id="subjectTabs">
    <button class="tab active" data-subject="math">数学</button>
    <button class="tab" data-subject="english">英語</button>
  </div>

  <!-- ===== 機能タブ ===== -->
  <div class="func-tabs" id="funcTabs">
    <button class="tab active" data-func="curriculum">📖 カリキュラム</button>
    <button class="tab" data-func="review">📝 総復習テスト</button>
    <button class="tab" data-func="test">📊 復習テスト</button>
    <button class="tab" data-func="calc">🧮 計算テスト</button>
  </div>

  <!-- ===== コンテンツ表示領域 ===== -->
  <div id="contentArea">
    <!-- JavaScript で動的生成 -->
  </div>

  <div class="toast-msg" id="toast"></div>
</div>

<script src="../scripts/tetsu-data.js"></script>
<script>
// ============================================================
// 鉄律会ページ メインロジック
// ============================================================

const DATA = window.TETSU_DATA || {};

let currentGrade = '1';
let currentSubject = 'math';
let currentFunc = 'curriculum';

function getData() {
  const gradeData = DATA[currentGrade];
  if (!gradeData) return null;
  return gradeData[currentSubject] || null;
}

// ===== 偏差値の色 =====
function getDevClass(dev) {
  if (dev === null || dev === undefined) return '';
  if (dev >= 65) return 'dev-high';
  if (dev >= 55) return 'dev-mid';
  if (dev >= 45) return 'dev-avg';
  return 'dev-low';
}

// ===== レンダリング =====
function renderContent() {
  const area = document.getElementById('contentArea');
  const data = getData();

  if (!data) {
    area.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-construction"></i>
        <p>${['1','2'].includes(currentGrade) ? 'データ準備中です' : 'データがありません'}</p>
      </div>
    `;
    return;
  }

  if (currentFunc === 'curriculum') {
    renderCurriculum(area, data);
  } else {
    renderTests(area, data);
  }
}

// ===== カリキュラム表示 =====
function renderCurriculum(area, data) {
  const curriculum = data.curriculum || [];
  if (!curriculum || curriculum.length === 0) {
    area.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-book"></i>
        <p>カリキュラムデータがありません</p>
      </div>
    `;
    return;
  }

  let html = `
    <div class="curriculum-table-wrap">
      <table class="curriculum-table">
        <thead>
          <tr>
            <th>日付</th>
            <th>週</th>
            <th>授業内容</th>
            <th>総復習テスト</th>
          </tr>
        </thead>
        <tbody>
  `;

  curriculum.forEach(item => {
    const isTest = item.test && item.test !== null && item.test !== '';
    const testClass = isTest ? 'test' : '';
    const double = item.week && (item.week.includes('W1') || item.week.includes('W2'));
    const doubleHtml = double ? `<span class="double">(W1/W2)</span>` : '';

    // 休講期間
    if (item.date === '休講' || item.content === '休講' || !item.date) {
      html += `
        <tr class="holiday">
          <td>${item.date || ''}</td>
          <td colspan="3">${item.content || '休講'}</td>
        </tr>
      `;
      return;
    }

    // 日付が空の場合（英語の週表示など）
    const displayDate = item.date || '';

    html += `
      <tr>
        <td>${displayDate}</td>
        <td>${item.week || ''} ${doubleHtml}</td>
        <td>${item.content || ''}</td>
        <td class="${testClass}">${isTest ? item.test : '—'}</td>
      </tr>
    `;
  });

  html += `
        </tbody>
      </table>
    </div>
    <div style="margin-top: 16px; font-size:0.8rem; color:#6b5d4e; display:flex; gap:20px; flex-wrap:wrap;">
      <span><span style="background:#f0ebe4; padding:2px 10px; border-radius:4px;">総復習テスト実施週</span></span>
      <span><span style="color:#8f735b;">W1/W2</span> ダブル授業</span>
    </div>
  `;

  area.innerHTML = html;
}

// ===== テスト表示 =====
function renderTests(area, data) {
  const tests = data.tests || {};
  let testData = [];
  let funcName = '';

  if (currentFunc === 'review') {
    testData = tests.review || [];
    funcName = '総復習テスト';
  } else if (currentFunc === 'test') {
    testData = tests.test || [];
    funcName = '復習テスト';
  } else if (currentFunc === 'calc') {
    testData = tests.calc || [];
    funcName = '計算テスト';
  }

  if (!testData || testData.length === 0) {
    area.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-clipboard-list"></i>
        <p>${funcName} データがありません</p>
      </div>
    `;
    return;
  }

  const statusMap = {
    done: { label: '済', class: 'done' },
    pending: { label: '実施予定', class: 'pending' },
    upcoming: { label: '予定', class: 'upcoming' }
  };

  // 統計情報
  const doneItems = testData.filter(t => t.status === 'done' && t.score !== null);
  const doneCount = doneItems.length;
  const avgScore = doneCount > 0 ? Math.round(doneItems.reduce((s, t) => s + t.score, 0) / doneCount) : null;
  const avgDev = doneCount > 0 ? Math.round(doneItems.reduce((s, t) => s + t.deviation, 0) / doneCount) : null;

  let html = `
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:16px;">
      <div>
        <span style="font-weight:600; font-size:1.1rem;">${funcName}</span>
        <span style="margin-left:12px; font-size:0.85rem; color:#6b5d4e;">全 ${testData.length} 件</span>
      </div>
      ${doneCount > 0 ? `
        <div style="font-size:0.85rem; background:#f0ebe4; padding:4px 16px; border-radius:40px;">
          平均点: <strong>${avgScore}</strong> 点 &nbsp;|&nbsp; 平均偏差値: <strong>${avgDev}</strong>
        </div>
      ` : ''}
    </div>
    <div class="test-list">
  `;

  testData.forEach(item => {
    const status = statusMap[item.status] || statusMap.upcoming;
    const hasResult = item.status === 'done' && item.score !== null;
    // ★★★ 出題範囲（range）を表示 ★★★
    const rangeDisplay = item.range ? `<div style="font-size:0.8rem; color:#8f735b; margin-top:2px;">📖 ${item.range}</div>` : '';

    let scoreHtml = '';
    if (hasResult) {
      const devClass = getDevClass(item.deviation);
      scoreHtml = `
        <div class="score-info">
          <span class="num">${item.score}</span> / 100
          <span class="avg">平均 ${item.avg}</span>
          <span class="dev ${devClass}">偏差値 ${item.deviation}</span>
        </div>
        ${item.note ? `<div class="note">${item.note}</div>` : ''}
      `;
    } else {
      scoreHtml = `<div style="font-size:0.8rem; color:#b7a086; margin-top:4px;">未実施</div>`;
    }

    html += `
      <div class="test-item">
        <div>
          <div class="name">${item.name}</div>
          <div class="date">${item.date || '日程未定'}</div>
          ${rangeDisplay}  <!-- ★ 出題範囲を表示 ★ -->
          ${scoreHtml}
        </div>
        <span class="status ${status.class}">${status.label}</span>
      </div>
    `;
  });

  html += `</div>`;
  area.innerHTML = html;
}

// ============================================================
// イベントハンドラ
// ============================================================

document.addEventListener('DOMContentLoaded', function() {
  // 学年タブ
  document.querySelectorAll('#gradeTabs .tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('#gradeTabs .tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentGrade = this.dataset.grade;
      renderContent();
    });
  });

  // 科目タブ
  document.querySelectorAll('#subjectTabs .tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('#subjectTabs .tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentSubject = this.dataset.subject;
      renderContent();
    });
  });

  // 機能タブ
  document.querySelectorAll('#funcTabs .tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('#funcTabs .tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentFunc = this.dataset.func;
      renderContent();
    });
  });

  // 初期表示
  renderContent();
  updateStatus();

  // Enter キーで Token 設定
  document.getElementById('tokenInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') setTokenFromInput();
  });
});

// ============================================================
// Token 管理（共通）
// ============================================================

function getToken() {
  return localStorage.getItem('github_token') || '';
}

function setTokenFromInput() {
  const input = document.getElementById('tokenInput');
  if (!input) return;
  const token = input.value.trim();
  if (!token) { showToast('❌ Token を入力してください'); return; }
  if (!token.startsWith('ghp_')) { showToast('❌ Token は ghp_ で始まる必要があります'); return; }
  localStorage.setItem('github_token', token);
  input.value = '';
  updateStatus();
  showToast('✅ Token を設定しました');
}

function updateStatus() {
  const token = getToken();
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const status = document.getElementById('tokenStatus');
  const saveBtn = document.getElementById('saveBtn');
  const loadBtn = document.getElementById('loadBtn');

  if (token) {
    if (dot) dot.className = 'status-dot online';
    if (text) text.textContent = 'オンライン';
    if (status) status.textContent = '✅ ' + token.substring(0, 8) + '...';
    if (saveBtn) saveBtn.disabled = false;
    if (loadBtn) loadBtn.disabled = false;
  } else {
    if (dot) dot.className = 'status-dot offline';
    if (text) text.textContent = 'オフライン';
    if (status) status.textContent = '🔑 未設定';
    if (saveBtn) saveBtn.disabled = true;
    if (loadBtn) loadBtn.disabled = true;
  }
}

function showToast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ============================================================
// 共通関数（他のページから呼ばれる）
// ============================================================

function saveToGitHub() { showToast('💾 GitHub保存機能は後日実装予定'); }
function loadFromGitHub() { showToast('📥 GitHub読込機能は後日実装予定'); }
function exportData() { showToast('📁 バックアップ機能は後日実装予定'); }
function importData() { showToast('📁 復元機能は後日実装予定'); }
</script>
</body>
</html>
