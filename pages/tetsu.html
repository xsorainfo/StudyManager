    .nav-links a.active { background: #5f4b38; color: #fff2e0; }
    .nav-right { display: flex; align-items: center; gap: 14px; font-size: 0.9rem; flex-wrap: wrap; }
    .nav-right .user-badge { background: #3f352b; padding: 6px 18px 6px 14px; border-radius: 40px; display: flex; align-items: center; gap: 8px; }
    .nav-right .data-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .nav-right .data-actions button { background: #3f352b; border: none; color: #e8dfd5; padding: 6px 14px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; transition: 0.15s; display: flex; align-items: center; gap: 5px; }
    .nav-right .data-actions button:hover { background: #5f4b38; color: #fff; }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }
    .status-dot.online { background: #4CAF50; }
    .status-dot.offline { background: #f44336; }

    .token-bar { background: #f0ebe4; border-radius: 20px; padding: 12px 20px; margin-bottom: 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .token-bar .label { font-weight: 600; color: #3d3229; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
    .token-bar input { flex: 1; min-width: 200px; padding: 8px 16px; border: 2px solid #d8cdbf; border-radius: 40px; font-size: 0.85rem; outline: none; background: white; font-family: monospace; }
    .token-bar input:focus { border-color: #8f735b; }
    .token-bar .token-status { font-size: 0.8rem; color: #6b5d4e; white-space: nowrap; }
    .token-bar .btn-set { background: #2c241c; border: none; color: white; padding: 6px 20px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.15s; }
    .token-bar .btn-set:hover { background: #4d3b2c; }

    /* 页面标题 */
    .page-title { font-size: 1.8rem; font-weight: 700; color: #2a221b; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .page-title i { color: #8f735b; }
    .page-title .sub { font-size: 0.9rem; font-weight: 400; color: #6b5d4e; margin-left: 12px; }

    /* ===== 学年タブ ===== */
    .grade-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; border-bottom: 2px solid #e7dfd5; padding-bottom: 12px; }
    .grade-tabs .tab { padding: 8px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: 0.15s; background: #f0ebe4; color: #5f4f3d; border: none; }
    .grade-tabs .tab:hover { background: #e3d9ce; }
    .grade-tabs .tab.active { background: #2c241c; color: #f0ebe3; }

    /* ===== 科目タブ ===== */
    .subject-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .subject-tabs .tab { padding: 6px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; font-size: 0.9rem; transition: 0.15s; background: #f0ebe4; color: #5f4f3d; border: none; }
    .subject-tabs .tab:hover { background: #e3d9ce; }
    .subject-tabs .tab.active { background: #8f735b; color: white; }

    /* ===== 機能タブ（カリキュラム / テスト） ===== */
    .func-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 1px solid #e7dfd5; padding-bottom: 12px; }
    .func-tabs .tab { padding: 6px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; font-size: 0.85rem; transition: 0.15s; background: transparent; color: #6b5d4e; border: none; }
    .func-tabs .tab:hover { background: #f0ebe4; }
    .func-tabs .tab.active { background: #f0ebe4; color: #2c241c; font-weight: 600; }

    /* ===== カリキュラム表 ===== */
    .curriculum-table-wrap { overflow-x: auto; }
    .curriculum-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 700px; }
    .curriculum-table th { background: #2c241c; color: #f0ebe3; padding: 10px 14px; text-align: left; font-weight: 600; }
    .curriculum-table td { padding: 8px 14px; border-bottom: 1px solid #ede6dd; }
    .curriculum-table tr:hover { background: #f8f4ef; }
    .curriculum-table .test { background: #f0ebe4; font-weight: 500; color: #8f4a4a; }
    .curriculum-table .holiday { background: #f5f0e8; color: #b7a086; font-style: italic; }
    .curriculum-table .double { font-size: 0.7rem; color: #8f735b; }

    .test-list { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .test-item .status.pending { background: #fff3e0; color: #e65100; }
    .test-item .status.upcoming { background: #e3f2fd; color: #0d47a1; }

    .empty-state { text-align: center; padding: 60px 20px; color: #b7a086; }
    .empty-state i { font-size: 3rem; margin-bottom: 16px; }
    .empty-state p { font-size: 1.1rem; }

    .toast-msg.show { opacity: 1; }
    #fileInput { display: none; }
    .flex { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

      .grade-tabs .tab { padding: 6px 16px; font-size: 0.8rem; }
      .subject-tabs .tab { padding: 4px 14px; font-size: 0.8rem; }

// ============================================================
// 表示ロジック
// ============================================================

let currentGrade = '1';
let currentSubject = 'math';
let currentFunc = 'curriculum';

function getData() {
  const gradeData = CURRICULUM_DATA[currentGrade];
  if (!gradeData) return null;
  return gradeData[currentSubject] || null;
}

function renderContent() {
  const area = document.getElementById('contentArea');
  const data = getData();

  if (!data) {
    area.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-construction"></i>
        <p>${currentGrade === '1' || currentGrade === '2' ? '準備中です' : 'データ準備中'}</p>
      </div>
    `;
    return;
  }

  if (currentFunc === 'curriculum') {
    renderCurriculum(area, data);
  } else {
    renderTests(area, data);
  }
}

function renderCurriculum(area, data) {
  const curriculum = data.curriculum || [];
  let html = `
    <div class="curriculum-table-wrap">
      <table class="curriculum-table">
        <thead>
          <tr>
            <th>日付</th>
            <th>週</th>
            <th>授業内容</th>
            <th>総復習テスト</th>
          </tr>
        </thead>
        <tbody>
  `;

  curriculum.forEach(item => {
    const isTest = item.test !== '—' && item.test !== '';
    const testClass = isTest ? 'test' : '';
    const double = item.week.includes('W1') || item.week.includes('W2');
    const doubleHtml = double ? `<span class="double">(W1/W2)</span>` : '';

    // 休講期間のチェック（日付が空の場合）
    if (item.date === '休講' || item.content === '休講') {
      html += `
        <tr class="holiday">
          <td>${item.date}</td>
          <td colspan="3">${item.content}</td>
        </tr>
      `;
      return;
    }

    html += `
      <tr>
        <td>${item.date}</td>
        <td>${item.week} ${doubleHtml}</td>
        <td>${item.content}</td>
        <td class="${testClass}">${item.test || '—'}</td>
      </tr>
    `;
  });

  html += `
        </tbody>
      </table>
    </div>
  `;

  // 凡例
  html += `
    <div style="margin-top: 16px; font-size:0.8rem; color:#6b5d4e; display:flex; gap:20px; flex-wrap:wrap;">
      <span><span style="background:#f0ebe4; padding:2px 10px; border-radius:4px;">総復習テスト実施週</span></span>
      <span><span style="color:#8f735b;">W1/W2</span> ダブル授業</span>
    </div>
  `;

  area.innerHTML = html;
}

function renderTests(area, data) {
  const tests = data.tests || {};
  let testData = [];

  if (currentFunc === 'review') testData = tests.review || [];
  else if (currentFunc === 'test') testData = tests.test || [];
  else if (currentFunc === 'calc') testData = tests.calc || [];

  if (!testData || testData.length === 0) {
    area.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-clipboard-list"></i>
        <p>${currentFunc === 'review' ? '総復習テスト' : currentFunc === 'test' ? '復習テスト' : '計算テスト'} データがありません</p>
      </div>
    `;
    return;
  }

  const statusMap = {
    done: { label: '済', class: 'done' },
    pending: { label: '実施予定', class: 'pending' },
    upcoming: { label: '予定', class: 'upcoming' }
  };

  const funcNames = {
    review: '総復習テスト',
    test: '復習テスト',
    calc: '計算テスト'
  };

  let html = `
    <div style="margin-bottom:16px;">
      <span style="font-weight:600; font-size:1.1rem;">${funcNames[currentFunc]}</span>
      <span style="margin-left:12px; font-size:0.85rem; color:#6b5d4e;">全 ${testData.length} 件</span>
    </div>
    <div class="test-list">
  `;

  testData.forEach(item => {
    const status = statusMap[item.status] || statusMap.upcoming;
    html += `
      <div class="test-item">
        <div>
          <div class="name">${item.name}</div>
          <div class="date">${item.date || '日程未定'}</div>
        </div>
        <span class="status ${status.class}">${status.label}</span>
      </div>
    `;
  });

  html += `</div>`;
  area.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function() {

      currentGrade = this.dataset.grade;
      renderContent();
    });
  });

  // 科目タブ
  document.querySelectorAll('#subjectTabs .tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('#subjectTabs .tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentSubject = this.dataset.subject;
      renderContent();
    });
  });

  // 機能タブ
  document.querySelectorAll('#funcTabs .tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('#funcTabs .tab').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentFunc = this.dataset.func;
      renderContent();
    });
  });

  // 初期表示
  renderContent();

  // Token関連（共通関数）
  updateStatus();
});

// ============================================================
// Token 管理（共通）
// ============================================================

function getToken() {
  return localStorage.getItem('github_token') || '';
}

function setTokenFromInput() {
  const input = document.getElementById('tokenInput');
  if (!input) return;
  const token = input.value.trim();
  if (!token) { showToast('❌ Token を入力してください'); return; }
  if (!token.startsWith('ghp_')) { showToast('❌ Token は ghp_ で始まる必要があります'); return; }
  localStorage.setItem('github_token', token);
  input.value = '';
  updateStatus();
  showToast('✅ Token を設定しました');
}

function updateStatus() {
  const token = getToken();
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const status = document.getElementById('tokenStatus');
  const saveBtn = document.getElementById('saveBtn');
  const loadBtn = document.getElementById('loadBtn');

  if (token) {
    if (dot) dot.className = 'status-dot online';
    if (text) text.textContent = 'オンライン';
    if (status) status.textContent = '✅ ' + token.substring(0, 8) + '...';
    if (saveBtn) saveBtn.disabled = false;
    if (loadBtn) loadBtn.disabled = false;
  } else {
    if (dot) dot.className = 'status-dot offline';
    if (text) text.textContent = 'オフライン';
    if (status) status.textContent = '🔑 未設定';
    if (saveBtn) saveBtn.disabled = true;
    if (loadBtn) loadBtn.disabled = true;
  }
}

function showToast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 3000);
}

// Enter キーで Token 設定
document.getElementById('tokenInput')?.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') setTokenFromInput();
});
