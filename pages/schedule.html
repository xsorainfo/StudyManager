<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>年間予定 - 学び航路</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="/StudyManager/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/StudyManager/favicon.png" />
    
    <link rel="stylesheet" href="/StudyManager/scripts/common.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Noto Sans JP', system-ui, sans-serif;
        }
        
        body {
            background: #f5f2ec;
            color: #1e1a16;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .app-wrapper {
            max-width: 1400px;
            width: 100%;
            background: #fcf9f5;
            border-radius: 40px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            padding: 24px 30px 40px;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2a221b;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .page-title i {
            color: #8f735b;
        }
        .page-title .sub {
            font-size: 0.9rem;
            font-weight: 400;
            color: #6b5d4e;
            margin-left: 12px;
        }

        .filter-bar {
            background: #f8f4ef;
            border-radius: 20px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px 24px;
            align-items: center;
            border: 1px solid #ede8e0;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #3d3229;
        }

        .filter-group select {
            padding: 8px 16px;
            border: 2px solid #d8cdbf;
            border-radius: 40px;
            font-size: 0.85rem;
            outline: none;
            background: white;
            color: #2a221b;
            cursor: pointer;
            min-width: 100px;
            transition: 0.15s;
        }

        .filter-group select:focus {
            border-color: #8f735b;
        }

        .filter-group .badge-count {
            background: #e7ddd2;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #3d3229;
            font-weight: 600;
        }

        .filter-hint {
            margin-left: auto;
            font-size: 0.8rem;
            color: #b7a086;
        }
        .filter-hint i {
            margin-right: 4px;
        }
        .filter-hint .today-label {
            margin-left: 12px;
            background: #fff3e0;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #e65100;
        }

        /* ===== 学期カード ===== */
        .semester-card {
            background: #fffffffa;
            border-radius: 28px;
            padding: 20px 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.03);
            border: 1px solid #ede8e0;
            margin-bottom: 20px;
            border-left: 6px solid #8f735b;
            transition: 0.15s;
        }

        .semester-card:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
        }

        .semester-card .card-header {
            border-bottom: 2px solid #e7dfd5;
            padding-bottom: 12px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .semester-card .card-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #2a221b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .semester-card .card-header h2 .semester-badge {
            font-size: 0.7rem;
            background: #f0ebe4;
            color: #4a3a2a;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 600;
        }

        .semester-card .card-header .event-count {
            font-size: 0.8rem;
            color: #6b5d4e;
            background: #f5f0e8;
            padding: 2px 14px;
            border-radius: 40px;
        }

        .semester-card .card-header .card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .semester-card .card-header .card-actions button {
            padding: 4px 14px;
            border: 2px solid #d8cdbf;
            border-radius: 40px;
            background: white;
            font-size: 0.7rem;
            font-weight: 600;
            color: #3d3229;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .semester-card .card-header .card-actions button:hover {
            background: #f0ebe4;
        }

        .semester-card .card-header .card-actions button.add-btn {
            background: #2c241c;
            color: white;
            border-color: #2c241c;
        }

        .semester-card .card-header .card-actions button.add-btn:hover {
            background: #4d3b2c;
        }

        /* ===== イベントリスト ===== */
        .event-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2px 0;
        }

        /* ===== イベントアイテム ===== */
        .event-item {
            display: flex;
            align-items: stretch;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 12px;
            transition: 0.15s;
            font-size: 0.9rem;
            border-bottom: 1px solid #f5f0e8;
            background: transparent;
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-item:hover {
            background: #f5f0e8;
        }

        /* ===== 今日のイベント（ハイライト） ===== */
        .event-item.today {
            background: #fff3e0;
            border-left: 4px solid #e65100;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(230, 81, 0, 0.12);
        }

        .event-item.today .event-date {
            background: #e65100;
            color: white;
        }

        .event-item.today .today-badge {
            display: inline-block;
            background: #e65100;
            color: white;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 1px 10px;
            border-radius: 40px;
            margin-left: 6px;
            animation: pulse-badge 2s ease-in-out infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .event-item .event-date {
            font-weight: 700;
            color: #8f735b;
            min-width: 52px;
            font-size: 0.85rem;
            background: #f0ebe4;
            padding: 4px 10px;
            border-radius: 6px;
            text-align: center;
            font-feature-settings: "tnum";
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            height: fit-content;
            align-self: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .event-item .event-date-input {
            width: 60px;
            padding: 4px 8px;
            border: 2px solid #8f735b;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #8f735b;
            background: #fff;
            outline: none;
            text-align: center;
            flex-shrink: 0;
            align-self: center;
        }

        .event-item .event-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .event-item .event-title {
            color: #2a221b;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-weight: 500;
            flex-wrap: wrap;
        }

        .event-item .event-title-input {
            flex: 1;
            padding: 4px 10px;
            border: 2px solid #8f735b;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            background: white;
            min-width: 80px;
            font-family: inherit;
            font-weight: 500;
        }

        .event-item .event-title .event-marker {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .event-item .event-title .marker-test {
            background: #c62828;
        }
        .event-item .event-title .marker-event {
            background: #2e7d32;
        }
        .event-item .event-title .marker-holiday {
            background: #e65100;
        }
        .event-item .event-title .marker-other {
            background: #b7a086;
        }

        /* ===== メモ（表示時） ===== */
        .event-item .event-memo {
            font-size: 0.78rem;
            color: #6b5d4e;
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 6px;
            background: #f8f4ef;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
            max-height: 80px;
            overflow-y: auto;
            transition: 0.15s;
            border: 1px solid transparent;
        }

        .event-item .event-memo:hover {
            background: #ede6dd;
            border-color: #d8cdbf;
        }

        .event-item .event-memo:empty::before {
            content: 'メモを追加';
            color: #b7a086;
            font-style: italic;
        }

        /* ===== メモ（編集時） ===== */
        .event-item .event-memo-input {
            flex: 1;
            padding: 6px 10px;
            border: 2px solid #b7a086;
            border-radius: 8px;
            font-size: 0.8rem;
            outline: none;
            background: white;
            min-width: 60px;
            font-family: inherit;
            color: #3d3229;
            resize: vertical;
            line-height: 1.6;
            min-height: 50px;
            max-height: 150px;
        }

        .event-item .event-memo-input:focus {
            border-color: #8f735b;
        }

        .event-item .event-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            align-items: center;
        }

        .event-item .event-actions button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #6b5d4e;
            transition: 0.15s;
        }

        .event-item .event-actions button:hover {
            background: #ede6dd;
        }

        .event-item .event-actions button.delete-btn:hover {
            color: #c62828;
            background: #f5e0e0;
        }

        .event-item .event-actions button.save-btn {
            color: #2e7d32;
        }

        .event-item .event-actions button.save-btn:hover {
            background: #e0f0e0;
        }

        .event-item .event-actions button.cancel-btn:hover {
            background: #f0ebe4;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #b7a086;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .empty-state p {
            font-size: 0.95rem;
        }

        .empty-events {
            text-align: center;
            padding: 20px;
            color: #b7a086;
            font-size: 0.85rem;
        }

        .toast-msg {
            background: #2c241c;
            color: #f0e8de;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
        .toast-msg.show {
            opacity: 1;
        }

        #fileInput {
            display: none;
        }

        /* ===== レスポンシブ ===== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            .app-wrapper {
                padding: 16px 16px 30px;
                border-radius: 24px;
            }
            .page-title {
                font-size: 1.4rem;
            }
            .page-title .sub {
                font-size: 0.75rem;
                margin-left: 4px;
            }
            .filter-bar {
                padding: 12px 16px;
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {
                flex-wrap: wrap;
            }
            .filter-group select {
                flex: 1;
                min-width: 80px;
            }
            .filter-hint {
                margin-left: 0;
            }
            .filter-hint .today-label {
                margin-left: 0;
                display: inline-block;
                margin-top: 4px;
            }
            .semester-card {
                padding: 16px 16px;
            }
            .event-item {
                flex-wrap: wrap;
                padding: 8px 6px;
                gap: 6px;
            }
            .event-item .event-date,
            .event-item .event-date-input {
                min-width: 44px;
                width: 44px;
                font-size: 0.75rem;
            }
            .event-item .event-content {
                flex: 1 1 100%;
            }
            .event-item .event-title,
            .event-item .event-title-input {
                font-size: 0.85rem;
            }
            .event-item .event-memo,
            .event-item .event-memo-input {
                font-size: 0.7rem;
                min-height: 30px;
                max-height: 80px;
            }
            .event-item .event-actions button {
                padding: 2px 6px;
                font-size: 0.7rem;
            }
            .semester-card .card-header .card-actions button {
                font-size: 0.65rem;
                padding: 2px 10px;
            }
            .toast-msg {
                bottom: 80px;
                right: 16px;
                left: 16px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div id="navbarContainer"></div>
    <div id="tokenBarContainer"></div>

    <div class="page-title">
        <i class="fas fa-calendar-alt"></i> 年間予定
        <span class="sub">年間行事予定管理</span>
    </div>

    <div class="filter-bar">
        <div class="filter-group">
            <label for="gradeSelect"><i class="fas fa-graduation-cap"></i> 学年</label>
            <select id="gradeSelect" onchange="renderSchedule()">
                <option value="1">中1</option>
                <option value="2" selected>中2</option>
                <option value="3">中3</option>
                <option value="4">高1</option>
                <option value="5">高2</option>
                <option value="6">高3</option>
            </select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-list"></i> 総行事数</label>
            <span class="badge-count" id="totalCount">0</span>
        </div>
        <span class="filter-hint">
            <i class="fas fa-edit"></i> クリックで編集・メモは複数行対応
            <span class="today-label">
                <i class="fas fa-circle" style="font-size:0.5rem;"></i> 今日
            </span>
        </span>
    </div>

    <div id="scheduleContainer"></div>
</div>

<div class="toast-msg" id="toast"></div>

<script>
    window.SHOW_EXPORT = true;
    window.SHOW_IMPORT = true;

    const DATA_KEY = 'scheduleData';
    const DEFAULT_DATA_URL = '../data/schedule_data.json';
    const GITHUB_OWNER = 'xsorainfo';
    const GITHUB_REPO = 'StudyManager';
    const GITHUB_PATH = 'data/schedule_data.json';
    const GITHUB_BRANCH = 'main';

    const SEMESTER_COLORS = {
        '1': '#8f735b',
        '2': '#2e7d32',
        '3': '#e65100'
    };

    const SEMESTER_ICONS = {
        '1': 'fa-leaf',
        '2': 'fa-sun',
        '3': 'fa-snowflake'
    };

    const SEMESTER_NAMES = {
        '1': 'I学期',
        '2': 'II学期',
        '3': 'III学期'
    };

    let scheduleData = null;
    let editingEvent = null;

    // ===== 今日の日付を取得 =====
    function getToday() {
        const now = new Date();
        return {
            month: now.getMonth() + 1,
            day: now.getDate(),
            str: `${now.getMonth() + 1}/${now.getDate()}`
        };
    }

    // ===== 日付をパース（数値比較用） =====
    function parseDate(dateStr) {
        const match = dateStr.match(/(\d{1,2})\/(\d{1,2})/);
        if (!match) return null;
        return { month: parseInt(match[1]), day: parseInt(match[2]) };
    }

    // ===== 日付を数値化（ソート用） =====
    function dateToNumber(dateStr) {
        const parsed = parseDate(dateStr);
        if (!parsed) return 9999;
        return parsed.month * 100 + parsed.day;
    }

    // ===== マーカータイプ判定 =====
    function getMarkerClass(title) {
        const t = title.toLowerCase();
        if (t.includes('考査') || t.includes('テスト') || t.includes('試験') || t.includes('入試') || t.includes('検定')) return 'marker-test';
        if (t.includes('祭') || t.includes('式') || t.includes('会') || t.includes('総会') || t.includes('行事') || t.includes('講演')) return 'marker-event';
        if (t.includes('日') && (t.includes('記念') || t.includes('の日') || t.includes('祝日') || t.includes('休日'))) return 'marker-holiday';
        return 'marker-other';
    }

    // ===== データ読み込み =====
    async function loadData() {
        try {
            const cached = localStorage.getItem(DATA_KEY);
            if (cached) {
                try {
                    const parsed = JSON.parse(cached);
                    if (parsed && typeof parsed === 'object' && Object.keys(parsed).length > 0) {
                        scheduleData = parsed;
                        renderSchedule();
                        showToast('💾 キャッシュから読み込みました', 'info');
                        return;
                    }
                } catch (e) {}
            }

            const resp = await fetch(DEFAULT_DATA_URL);
            if (!resp.ok) throw new Error('データの読み込みに失敗しました');
            const data = await resp.json();
            scheduleData = data;
            localStorage.setItem(DATA_KEY, JSON.stringify(data));
            renderSchedule();
            showToast('📥 データを読み込みました', 'success');
        } catch (err) {
            console.error(err);
            showToast('❌ データ読み込みエラー: ' + err.message, 'error');
            scheduleData = {};
            renderSchedule();
        }
    }

    function saveScheduleData() {
        localStorage.setItem(DATA_KEY, JSON.stringify(scheduleData));
    }

    // ===== レンダリング（日付順） =====
    function renderSchedule() {
        const container = document.getElementById('scheduleContainer');
        const grade = document.getElementById('gradeSelect').value;
        const today = getToday();

        if (!scheduleData || !scheduleData[grade]) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-calendar-times"></i>
                    <p>データがありません</p>
                    <p style="font-size:0.85rem; color:#b7a086;">デフォルトデータを読み込むか、インポートしてください</p>
                </div>
            `;
            document.getElementById('totalCount').textContent = '0';
            return;
        }

        const gradeData = scheduleData[grade];
        const semesters = gradeData.semesters || {};
        const gradeName = gradeData.name || '未設定';

        let totalEvents = 0;
        let html = '';

        const semesterKeys = ['1', '2', '3'];
        for (const key of semesterKeys) {
            const sem = semesters[key];
            if (!sem) continue;
            const events = sem.events || [];
            totalEvents += events.length;

            const color = SEMESTER_COLORS[key] || '#8f735b';
            const icon = SEMESTER_ICONS[key] || 'fa-calendar';
            const semName = SEMESTER_NAMES[key] || sem.name || key + '学期';

            html += `
                <div class="semester-card" style="border-left-color: ${color};" data-grade="${grade}" data-semester="${key}">
                    <div class="card-header">
                        <h2>
                            <i class="fas ${icon}" style="color:${color};"></i>
                            ${gradeName} ${semName}
                            <span class="semester-badge">${events.length}件</span>
                        </h2>
                        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                            <span class="event-count"><i class="far fa-calendar-alt"></i> ${events.length}行事</span>
                            <div class="card-actions">
                                <button class="add-btn" onclick="addEvent('${grade}', '${key}')">
                                    <i class="fas fa-plus"></i> 追加
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="event-list">
            `;

            if (events.length === 0) {
                html += `<div class="empty-events">予定はありません。右上の「追加」から追加してください</div>`;
            } else {
                // ★★★ 日付順にソート ★★★
                const sortedIndices = events.map((_, idx) => idx)
                    .sort((a, b) => {
                        const dateA = events[a].date || '';
                        const dateB = events[b].date || '';
                        return dateToNumber(dateA) - dateToNumber(dateB);
                    });

                let currentMonth = -1;

                for (const idx of sortedIndices) {
                    const ev = events[idx];
                    const parsed = parseDate(ev.date);
                    const month = parsed ? parsed.month : 0;

                    // 月が変わったら月見出しを表示
                    if (month !== currentMonth && month > 0) {
                        currentMonth = month;
                        // 同じ月の件数をカウント
                        const monthCount = sortedIndices.filter(i => {
                            const p = parseDate(events[i].date);
                            return p && p.month === month;
                        }).length;
                        html += `
                            <div class="month-header" style="font-size:1.05rem;font-weight:700;color:#2a221b;padding:10px 12px 6px 12px;margin-top:8px;border-bottom:2px solid #e7dfd5;display:flex;align-items:center;gap:10px;">
                                <i class="fas fa-calendar-alt" style="color:#8f735b;"></i> ${month}月
                                <span style="font-size:0.7rem;font-weight:400;color:#6b5d4e;background:#f0ebe4;padding:0 12px;border-radius:40px;">${monthCount}件</span>
                            </div>
                        `;
                    }

                    const marker = getMarkerClass(ev.title);
                    const memo = ev.memo || '';

                    // 今日の日付かチェック
                    const isToday = parsed && parsed.month === today.month && parsed.day === today.day;
                    const todayClass = isToday ? ' today' : '';

                    const isEditing = (editingEvent && editingEvent.grade === grade &&
                                      editingEvent.semester === key && editingEvent.index === idx);

                    if (isEditing) {
                        html += `
                            <div class="event-item editing${todayClass}">
                                <input class="event-date-input" id="edit_date_${grade}_${key}_${idx}" value="${ev.date}" placeholder="月/日" />
                                <div class="event-content">
                                    <input class="event-title-input" id="edit_title_${grade}_${key}_${idx}" value="${ev.title}" placeholder="行事名" />
                                    <textarea class="event-memo-input" id="edit_memo_${grade}_${key}_${idx}" placeholder="メモ（複数行可）" rows="2">${memo}</textarea>
                                </div>
                                <div class="event-actions">
                                    <button class="save-btn" onclick="saveEvent('${grade}', '${key}', ${idx})">
                                        <i class="fas fa-check"></i>
                                    </button>
                                    <button class="cancel-btn" onclick="cancelEdit('${grade}', '${key}', ${idx})">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    } else {
                        const memoDisplay = memo ? memo.replace(/\n/g, '') : '';
                        html += `
                            <div class="event-item${todayClass}" onclick="startEdit('${grade}', '${key}', ${idx})">
                                <span class="event-date">
                                    ${ev.date}
                                    ${isToday ? '<span class="today-badge">今日</span>' : ''}
                                </span>
                                <div class="event-content">
                                    <div class="event-title">
                                        <span class="event-marker ${marker}"></span>
                                        ${ev.title}
                                    </div>
                                    <div class="event-memo">${memo}</div>
                                </div>
                                <div class="event-actions" onclick="event.stopPropagation();">
                                    <button onclick="startEdit('${grade}', '${key}', ${idx})" title="編集">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="delete-btn" onclick="deleteEvent('${grade}', '${key}', ${idx})" title="削除">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    }
                }
            }

            html += `
                    </div>
                </div>
            `;
        }

        container.innerHTML = html;
        document.getElementById('totalCount').textContent = totalEvents;
    }

    // ===== イベント操作 =====
    function startEdit(grade, semester, index) {
        editingEvent = { grade, semester, index };
        renderSchedule();
        setTimeout(() => {
            const memoInput = document.getElementById(`edit_memo_${grade}_${semester}_${index}`);
            if (memoInput) memoInput.focus();
        }, 100);
    }

    function cancelEdit(grade, semester, index) {
        editingEvent = null;
        renderSchedule();
    }

    function saveEvent(grade, semester, index) {
        const dateInput = document.getElementById(`edit_date_${grade}_${semester}_${index}`);
        const titleInput = document.getElementById(`edit_title_${grade}_${semester}_${index}`);
        const memoInput = document.getElementById(`edit_memo_${grade}_${semester}_${index}`);

        if (!dateInput || !titleInput) {
            showToast('❌ 入力項目が見つかりません', 'error');
            return;
        }

        const date = dateInput.value.trim();
        const title = titleInput.value.trim();
        const memo = memoInput ? memoInput.value : '';

        if (!date) { showToast('❌ 日付を入力してください', 'error'); return; }
        if (!title) { showToast('❌ 行事名を入力してください', 'error'); return; }

        const gradeData = scheduleData[grade];
        if (!gradeData) { showToast('❌ データが見つかりません', 'error'); return; }
        const sem = gradeData.semesters[semester];
        if (!sem) { showToast('❌ 学期データが見つかりません', 'error'); return; }
        if (!sem.events || index >= sem.events.length) {
            showToast('❌ イベントが見つかりません', 'error');
            return;
        }

        sem.events[index] = { date, title, memo: memo || '' };
        saveScheduleData();
        editingEvent = null;
        renderSchedule();
        showToast('✅ 更新しました', 'success');
    }

    function deleteEvent(grade, semester, index) {
        if (!confirm('この行事を削除しますか？')) return;

        const gradeData = scheduleData[grade];
        if (!gradeData) return;
        const sem = gradeData.semesters[semester];
        if (!sem || !sem.events) return;

        sem.events.splice(index, 1);
        saveScheduleData();
        renderSchedule();
        showToast('🗑️ 削除しました', 'info');
    }

    function addEvent(grade, semester) {
        const gradeData = scheduleData[grade];
        if (!gradeData) {
            showToast('❌ 学年データが見つかりません', 'error');
            return;
        }
        if (!gradeData.semesters[semester]) {
            gradeData.semesters[semester] = { name: SEMESTER_NAMES[semester] || semester + '学期', events: [] };
        }
        if (!gradeData.semesters[semester].events) {
            gradeData.semesters[semester].events = [];
        }

        gradeData.semesters[semester].events.push({ date: '月/日', title: '新規行事', memo: '' });
        saveScheduleData();

        const newIndex = gradeData.semesters[semester].events.length - 1;
        editingEvent = { grade, semester, index: newIndex };
        renderSchedule();

        setTimeout(() => {
            const input = document.getElementById(`edit_date_${grade}_${semester}_${newIndex}`);
            if (input) { input.focus(); input.select(); }
        }, 100);

        showToast('📝 新規行事を追加しました', 'success');
    }

    // ===== GitHub連携 =====
    function getHeaders() {
        const token = getToken();
        if (!token) return null;
        return {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json'
        };
    }

    function getToken() {
        if (typeof window.getToken === 'function') return window.getToken();
        const tokenInput = document.getElementById('githubTokenInput');
        if (tokenInput) return tokenInput.value.trim();
        return localStorage.getItem('githubToken') || '';
    }

    async function saveToGitHub() {
        if (!scheduleData) { showToast('❌ データがありません', 'error'); return; }
        const token = getToken();
        if (!token) { showToast('❌ GitHub Tokenが設定されていません', 'error'); return; }
        saveScheduleData();

        try {
            const content = JSON.stringify(scheduleData, null, 2);
            const encoded = btoa(unescape(encodeURIComponent(content)));
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`;
            const headers = getHeaders();

            let sha = null;
            const checkRes = await fetch(url, { headers });
            if (checkRes.ok) {
                const fileData = await checkRes.json();
                sha = fileData.sha;
            }

            const body = { message: `📅 年間予定更新: ${new Date().toISOString()}`, content: encoded, branch: GITHUB_BRANCH };
            if (sha) body.sha = sha;

            const response = await fetch(url, { method: 'PUT', headers, body: JSON.stringify(body) });
            if (response.ok) {
                showToast('✅ GitHubに保存しました', 'success');
            } else {
                const err = await response.json();
                throw new Error(err.message || `HTTP ${response.status}`);
            }
        } catch (err) {
            console.error(err);
            showToast('❌ 保存エラー: ' + err.message, 'error');
        }
    }

    async function loadFromGitHub() {
        const token = getToken();
        if (!token) { showToast('❌ GitHub Tokenが設定されていません', 'error'); return; }

        try {
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`;
            const headers = getHeaders();
            const response = await fetch(url, { headers });

            if (response.status === 404) {
                showToast('📭 GitHubにデータがありません', 'info');
                return;
            }
            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const fileData = await response.json();
            const content = decodeURIComponent(escape(atob(fileData.content)));
            const loadedData = JSON.parse(content);

            if (typeof loadedData !== 'object' || loadedData === null) {
                throw new Error('データ形式が不正です');
            }

            scheduleData = loadedData;
            localStorage.setItem(DATA_KEY, JSON.stringify(loadedData));
            renderSchedule();
            showToast('✅ GitHubから読み込みました', 'success');
        } catch (err) {
            console.error(err);
            showToast('❌ 読込エラー: ' + err.message, 'error');
        }
    }

    function exportData() {
        if (!scheduleData) { showToast('❌ データがありません', 'error'); return; }
        const blob = new Blob([JSON.stringify(scheduleData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `schedule_data_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('📁 エクスポートしました', 'success');
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (typeof imported !== 'object' || imported === null) {
                    throw new Error('データ形式が不正です');
                }
                if (confirm('現在のデータをインポートデータで上書きしますか？')) {
                    scheduleData = imported;
                    localStorage.setItem(DATA_KEY, JSON.stringify(imported));
                    renderSchedule();
                    showToast('📁 インポートしました', 'success');
                }
            } catch (err) {
                showToast('❌ インポートエラー: ' + err.message, 'error');
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    async function resetToDefault() {
        if (!confirm('デフォルトデータに戻しますか？（現在のデータは失われます）')) return;
        try {
            const resp = await fetch(DEFAULT_DATA_URL);
            if (!resp.ok) throw new Error('デフォルトデータの読み込みに失敗');
            const data = await resp.json();
            scheduleData = data;
            localStorage.setItem(DATA_KEY, JSON.stringify(data));
            renderSchedule();
            showToast('🔄 デフォルトデータに戻しました', 'info');
        } catch (err) {
            showToast('❌ エラー: ' + err.message, 'error');
        }
    }

    function showToast(msg, type = 'info') {
        const el = document.getElementById('toast');
        if (!el) return;
        el.textContent = msg;
        el.className = 'toast-msg';
        el.style.background = type === 'error' ? '#8f4a4a' : type === 'success' ? '#2e7d32' : '#2c241c';
        el.style.color = '#f0e8de';
        setTimeout(() => el.classList.add('show'), 10);
        clearTimeout(el._timer);
        el._timer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadData();

        window.saveToGitHub = saveToGitHub;
        window.loadFromGitHub = loadFromGitHub;
        window.exportData = exportData;
        window.importData = importData;
        window.resetToDefault = resetToDefault;
        window.renderSchedule = renderSchedule;
        window.showToast = showToast;
        window.startEdit = startEdit;
        window.cancelEdit = cancelEdit;
        window.saveEvent = saveEvent;
        window.deleteEvent = deleteEvent;
        window.addEvent = addEvent;
    });
</script>
