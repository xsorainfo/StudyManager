<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>年間予定 - 学び航路</title>
    
    <!-- ★ iPad/iPhone ホーム画面アイコン ★ -->
    <link rel="apple-touch-icon" sizes="180x180" href="/StudyManager/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/StudyManager/favicon.png" />
    
    <!-- ★ 共通スタイル ★ -->
    <link rel="stylesheet" href="/StudyManager/scripts/common.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    
    <style>
        /* ===== ベース ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Helvetica Neue', 'Noto Sans JP', system-ui, sans-serif;
        }
        
        body {
            background: #f5f2ec;
            color: #1e1a16;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .app-wrapper {
            max-width: 1400px;
            width: 100%;
            background: #fcf9f5;
            border-radius: 40px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            padding: 24px 30px 40px;
        }

        /* ===== ページタイトル ===== */
        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2a221b;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .page-title i {
            color: #8f735b;
        }
        .page-title .sub {
            font-size: 0.9rem;
            font-weight: 400;
            color: #6b5d4e;
            margin-left: 12px;
        }

        /* ===== フィルター ===== */
        .filter-bar {
            background: #f8f4ef;
            border-radius: 20px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px 24px;
            align-items: center;
            border: 1px solid #ede8e0;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #3d3229;
        }

        .filter-group select {
            padding: 8px 16px;
            border: 2px solid #d8cdbf;
            border-radius: 40px;
            font-size: 0.85rem;
            outline: none;
            background: white;
            color: #2a221b;
            cursor: pointer;
            min-width: 100px;
            transition: 0.15s;
        }

        .filter-group select:focus {
            border-color: #8f735b;
        }

        .filter-group .badge-count {
            background: #e7ddd2;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #3d3229;
            font-weight: 600;
        }

        .filter-hint {
            margin-left: auto;
            font-size: 0.8rem;
            color: #b7a086;
        }
        .filter-hint i {
            margin-right: 4px;
        }

        /* ===== カード ===== */
        .semester-card {
            background: #fffffffa;
            border-radius: 28px;
            padding: 20px 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.03);
            border: 1px solid #ede8e0;
            margin-bottom: 20px;
            border-left: 6px solid #8f735b;
            transition: 0.15s;
        }

        .semester-card:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
        }

        .semester-card .card-header {
            border-bottom: 2px solid #e7dfd5;
            padding-bottom: 12px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .semester-card .card-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #2a221b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .semester-card .card-header h2 .semester-badge {
            font-size: 0.7rem;
            background: #f0ebe4;
            color: #4a3a2a;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 600;
        }

        .semester-card .card-header .event-count {
            font-size: 0.8rem;
            color: #6b5d4e;
            background: #f5f0e8;
            padding: 2px 14px;
            border-radius: 40px;
        }

        /* ===== イベントリスト ===== */
        .event-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 6px 16px;
        }

        .event-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            border-radius: 12px;
            transition: 0.15s;
            font-size: 0.9rem;
        }

        .event-item:hover {
            background: #f5f0e8;
        }

        .event-item .event-date {
            font-weight: 700;
            color: #8f735b;
            min-width: 48px;
            font-size: 0.85rem;
            background: #f0ebe4;
            padding: 2px 10px;
            border-radius: 6px;
            text-align: center;
            font-feature-settings: "tnum";
        }

        .event-item .event-title {
            color: #2a221b;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .event-item .event-title .event-marker {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .event-item .event-title .marker-test {
            background: #c62828;
        }
        .event-item .event-title .marker-event {
            background: #2e7d32;
        }
        .event-item .event-title .marker-holiday {
            background: #e65100;
        }
        .event-item .event-title .marker-other {
            background: #b7a086;
        }

        /* ===== 空の状態 ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #b7a086;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .empty-state p {
            font-size: 0.95rem;
        }

        .toast-msg {
            background: #2c241c;
            color: #f0e8de;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
        .toast-msg.show {
            opacity: 1;
        }

        #fileInput {
            display: none;
        }

        /* ===== レスポンシブ ===== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            .app-wrapper {
                padding: 16px 16px 30px;
                border-radius: 24px;
            }
            .page-title {
                font-size: 1.4rem;
            }
            .page-title .sub {
                font-size: 0.75rem;
                margin-left: 4px;
            }
            .filter-bar {
                padding: 12px 16px;
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {
                flex-wrap: wrap;
            }
            .filter-group select {
                flex: 1;
                min-width: 80px;
            }
            .filter-hint {
                margin-left: 0;
            }
            .semester-card {
                padding: 16px 16px;
            }
            .event-list {
                grid-template-columns: 1fr;
            }
            .event-item {
                padding: 4px 6px;
            }
            .toast-msg {
                bottom: 80px;
                right: 16px;
                left: 16px;
                text-align: center;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .event-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <!-- ★ ナビゲーションコンテナ（common.js が自動生成） ★ -->
    <div id="navbarContainer"></div>
    <!-- ★ Tokenバーコンテナ（common.js が自動生成） ★ -->
    <div id="tokenBarContainer"></div>

    <!-- ===== ページタイトル ===== -->
    <div class="page-title">
        <i class="fas fa-calendar-alt"></i> 年間予定
        <span class="sub">年間行事予定管理</span>
    </div>

    <!-- ===== フィルターバー ===== -->
    <div class="filter-bar">
        <div class="filter-group">
            <label for="gradeSelect"><i class="fas fa-graduation-cap"></i> 学年</label>
            <select id="gradeSelect" onchange="renderSchedule()">
                <option value="1">中1</option>
                <option value="2" selected>中2</option>
                <option value="3">中3</option>
                <option value="4">高1</option>
                <option value="5">高2</option>
                <option value="6">高3</option>
            </select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-list"></i> 総行事数</label>
            <span class="badge-count" id="totalCount">0</span>
        </div>
        <span class="filter-hint">
            <i class="fas fa-edit"></i> 編集はデータファイルを直接修正
        </span>
    </div>

    <!-- ===== スケジュール表示エリア ===== -->
    <div id="scheduleContainer">
        <!-- JSで動的にレンダリング -->
    </div>
</div>

<!-- ===== トースト ===== -->
<div class="toast-msg" id="toast"></div>

<!-- ============================================================ -->
<!-- スクリプト -->
<!-- ============================================================ -->

<script>
    // ============================================================
    // 🔧 データボタン表示設定（common.js 用）
    // ============================================================
    window.SHOW_EXPORT = true;
    window.SHOW_IMPORT = true;
    // ============================================================

    // ============================================================
    //  定数
    // ============================================================
    const DATA_KEY = 'scheduleData';
    const DEFAULT_DATA_URL = '../data/schedule_data.json';
    const GITHUB_OWNER = 'xsorainfo';
    const GITHUB_REPO = 'StudyManager';
    const GITHUB_PATH = 'data/schedule_data.json';
    const GITHUB_BRANCH = 'main';

    const SEMESTER_COLORS = {
        '1': '#8f735b',
        '2': '#2e7d32',
        '3': '#e65100'
    };

    const SEMESTER_ICONS = {
        '1': 'fa-leaf',
        '2': 'fa-sun',
        '3': 'fa-snowflake'
    };

    const SEMESTER_NAMES = {
        '1': '一学期',
        '2': '二学期',
        '3': '三学期'
    };

    // ============================================================
    //  マーカータイプ判定
    // ============================================================
    function getMarkerClass(title) {
        const t = title.toLowerCase();
        if (t.includes('考査') || t.includes('テスト') || t.includes('試験') || t.includes('入試')) return 'marker-test';
        if (t.includes('祭') || t.includes('式') || t.includes('会') || t.includes('研修') || t.includes('学習')) return 'marker-event';
        if (t.includes('日') && (t.includes('記念') || t.includes('の日'))) return 'marker-holiday';
        return 'marker-other';
    }

    // ============================================================
    //  データ読み込み
    // ============================================================
    let scheduleData = null;

    async function loadData() {
        try {
            // 1. localStorage から読み込み
            const cached = localStorage.getItem(DATA_KEY);
            if (cached) {
                try {
                    const parsed = JSON.parse(cached);
                    if (parsed && typeof parsed === 'object' && Object.keys(parsed).length > 0) {
                        scheduleData = parsed;
                        renderSchedule();
                        showToast('💾 キャッシュから読み込みました', 'info');
                        return;
                    }
                } catch (e) { /* 無視 */ }
            }

            // 2. デフォルトJSONを読み込み
            const resp = await fetch(DEFAULT_DATA_URL);
            if (!resp.ok) throw new Error('データの読み込みに失敗しました');
            const data = await resp.json();
            scheduleData = data;
            localStorage.setItem(DATA_KEY, JSON.stringify(data));
            renderSchedule();
            showToast('📥 データを読み込みました', 'success');
        } catch (err) {
            console.error(err);
            showToast('❌ データ読み込みエラー: ' + err.message, 'error');
            scheduleData = {};
            renderSchedule();
        }
    }

    // ============================================================
    //  レンダリング
    // ============================================================
    function renderSchedule() {
        const container = document.getElementById('scheduleContainer');
        const grade = document.getElementById('gradeSelect').value;

        if (!scheduleData || !scheduleData[grade]) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-calendar-times"></i>
                    <p>データがありません</p>
                    <p style="font-size:0.85rem; color:#b7a086;">デフォルトデータを読み込むか、インポートしてください</p>
                </div>
            `;
            document.getElementById('totalCount').textContent = '0';
            return;
        }

        const gradeData = scheduleData[grade];
        const semesters = gradeData.semesters || {};
        const gradeName = gradeData.name || '未設定';

        let totalEvents = 0;
        let html = '';

        const semesterKeys = ['1', '2', '3'];
        for (const key of semesterKeys) {
            const sem = semesters[key];
            if (!sem) continue;
            const events = sem.events || [];
            totalEvents += events.length;

            const color = SEMESTER_COLORS[key] || '#8f735b';
            const icon = SEMESTER_ICONS[key] || 'fa-calendar';
            const semName = SEMESTER_NAMES[key] || sem.name || key + '学期';

            html += `
                <div class="semester-card" style="border-left-color: ${color};">
                    <div class="card-header">
                        <h2>
                            <i class="fas ${icon}" style="color:${color};"></i>
                            ${gradeName} ${semName}
                            <span class="semester-badge">${events.length}件</span>
                        </h2>
                        <span class="event-count"><i class="far fa-calendar-alt"></i> ${events.length}行事</span>
                    </div>
                    <div class="event-list">
            `;

            if (events.length === 0) {
                html += `<div style="grid-column:1/-1; color:#b7a086; font-size:0.85rem; padding:8px 0;">予定はありません</div>`;
            } else {
                for (const ev of events) {
                    const marker = getMarkerClass(ev.title);
                    html += `
                        <div class="event-item">
                            <span class="event-date">${ev.date}</span>
                            <span class="event-title">
                                <span class="event-marker ${marker}"></span>
                                ${ev.title}
                            </span>
                        </div>
                    `;
                }
            }

            html += `
                    </div>
                </div>
            `;
        }

        container.innerHTML = html;
        document.getElementById('totalCount').textContent = totalEvents;
    }

    // ============================================================
    //  GitHub連携
    // ============================================================

    function getHeaders() {
        const token = getToken();
        if (!token) return null;
        return {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json'
        };
    }

    function getToken() {
        // common.js の getToken 関数を優先
        if (typeof window.getToken === 'function') {
            return window.getToken();
        }
        // フォールバック
        const tokenInput = document.getElementById('githubTokenInput');
        if (tokenInput) {
            return tokenInput.value.trim();
        }
        return localStorage.getItem('githubToken') || '';
    }

    async function saveToGitHub() {
        if (!scheduleData) {
            showToast('❌ データがありません', 'error');
            return;
        }

        const token = getToken();
        if (!token) {
            showToast('❌ GitHub Tokenが設定されていません', 'error');
            return;
        }

        // まずローカル保存
        localStorage.setItem(DATA_KEY, JSON.stringify(scheduleData));

        try {
            const content = JSON.stringify(scheduleData, null, 2);
            const encoded = btoa(unescape(encodeURIComponent(content)));
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`;
            const headers = getHeaders();

            let sha = null;
            const checkRes = await fetch(url, { headers });
            if (checkRes.ok) {
                const fileData = await checkRes.json();
                sha = fileData.sha;
            }

            const body = {
                message: `📅 年間予定更新: ${new Date().toISOString()}`,
                content: encoded,
                branch: GITHUB_BRANCH
            };
            if (sha) body.sha = sha;

            const response = await fetch(url, {
                method: 'PUT',
                headers: headers,
                body: JSON.stringify(body)
            });

            if (response.ok) {
                showToast('✅ GitHubに保存しました', 'success');
            } else {
                const err = await response.json();
                throw new Error(err.message || `HTTP ${response.status}`);
            }
        } catch (err) {
            console.error(err);
            showToast('❌ 保存エラー: ' + err.message, 'error');
        }
    }

    async function loadFromGitHub() {
        const token = getToken();
        if (!token) {
            showToast('❌ GitHub Tokenが設定されていません', 'error');
            return;
        }

        try {
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`;
            const headers = getHeaders();
            const response = await fetch(url, { headers });

            if (response.status === 404) {
                showToast('📭 GitHubにデータがありません', 'info');
                return;
            }
            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const fileData = await response.json();
            const content = decodeURIComponent(escape(atob(fileData.content)));
            const loadedData = JSON.parse(content);

            // バリデーション
            if (typeof loadedData !== 'object' || loadedData === null) {
                throw new Error('データ形式が不正です');
            }

            scheduleData = loadedData;
            localStorage.setItem(DATA_KEY, JSON.stringify(loadedData));
            renderSchedule();
            showToast('✅ GitHubから読み込みました', 'success');
        } catch (err) {
            console.error(err);
            showToast('❌ 読込エラー: ' + err.message, 'error');
        }
    }

    // ============================================================
    //  エクスポート / インポート
    // ============================================================

    function exportData() {
        if (!scheduleData) {
            showToast('❌ データがありません', 'error');
            return;
        }
        const blob = new Blob([JSON.stringify(scheduleData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `schedule_data_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('📁 エクスポートしました', 'success');
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (typeof imported !== 'object' || imported === null) {
                    throw new Error('データ形式が不正です');
                }
                if (confirm('現在のデータをインポートデータで上書きしますか？')) {
                    scheduleData = imported;
                    localStorage.setItem(DATA_KEY, JSON.stringify(imported));
                    renderSchedule();
                    showToast('📁 インポートしました', 'success');
                }
            } catch (err) {
                showToast('❌ インポートエラー: ' + err.message, 'error');
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    // ============================================================
    //  デフォルトに戻す
    // ============================================================

    async function resetToDefault() {
        if (!confirm('デフォルトデータに戻しますか？（現在のデータは失われます）')) return;
        try {
            const resp = await fetch(DEFAULT_DATA_URL);
            if (!resp.ok) throw new Error('デフォルトデータの読み込みに失敗');
            const data = await resp.json();
            scheduleData = data;
            localStorage.setItem(DATA_KEY, JSON.stringify(data));
            renderSchedule();
            showToast('🔄 デフォルトデータに戻しました', 'info');
        } catch (err) {
            showToast('❌ エラー: ' + err.message, 'error');
        }
    }

    // ============================================================
    //  トースト表示
    // ============================================================

    function showToast(msg, type = 'info') {
        const el = document.getElementById('toast');
        if (!el) return;
        el.textContent = msg;
        el.className = 'toast-msg';
        el.style.background = type === 'error' ? '#8f4a4a' : type === 'success' ? '#2e7d32' : '#2c241c';
        el.style.color = '#f0e8de';
        setTimeout(() => el.classList.add('show'), 10);
        clearTimeout(el._timer);
        el._timer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ============================================================
    //  初期化
    // ============================================================

    document.addEventListener('DOMContentLoaded', function() {
        // common.js がナビゲーションとTokenバーを自動生成
        // ただし、common.js が読み込まれていることが前提

        // データ読み込み
        loadData();

        // グローバル公開（ボタンからの呼び出し用）
        window.saveToGitHub = saveToGitHub;
        window.loadFromGitHub = loadFromGitHub;
        window.exportData = exportData;
        window.importData = importData;
        window.resetToDefault = resetToDefault;
        window.renderSchedule = renderSchedule;
        window.showToast = showToast;
    });
</script>

<!-- ============================================================ -->
<!-- common.js を読み込み（ナビゲーション・Tokenバー生成） -->
<!-- ============================================================ -->
<script src="../scripts/common.js"></script>

</body>
</html>
