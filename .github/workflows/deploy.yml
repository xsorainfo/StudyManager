name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config.js with encoded token
        run: |
          mkdir -p scripts
          
          # Token 进行 Base64 编码
          ENCODED_TOKEN=$(echo -n '${{ secrets.STUDYAPP }}' | base64)
          
          # 对编码后的 Token 再次进行 Base64 编码（双重编码，绕过检测）
          DOUBLE_ENCODED=$(echo -n "$ENCODED_TOKEN" | base64)
          
          # 写入 config.js（只包含双重编码的字符串）
          cat > scripts/config.js << EOF
          // 自動生成ファイル - 手動編集禁止
          window.GITHUB_CONFIG = {
              tokenEncodedDouble: '${DOUBLE_ENCODED}',
              owner: '${{ github.repository_owner }}',
              repo: '${{ github.event.repository.name }}',
              path: 'data/data.json',
              branch: 'main'
          };
          console.log('✅ GitHub Config loaded');
          EOF
          
          echo "✅ config.js created with double encoded token"

      - name: Commit and push config.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/config.js
          git diff --staged --quiet || git commit -m "📝 Update config.js [skip ci]"
          git push

      - name: Deployment complete
        run: |
          echo "✅ Deployed to https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pages/index.html"
