name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config.js
        run: |
          mkdir -p scripts
          
          # 对 Token 进行 Base64 编码（去掉换行）
          ENCODED_TOKEN=$(echo -n '${{ secrets.STUDYAPP }}' | base64 -w 0)
          
          # 使用 printf 和 echo 组合生成文件
          printf '// 自動生成ファイル\n' > scripts/config.js
          printf 'window.GITHUB_CONFIG = {\n' >> scripts/config.js
          printf '    tokenEncoded: "%s",\n' "$ENCODED_TOKEN" >> scripts/config.js
          printf '    owner: "%s",\n' "${{ github.repository_owner }}" >> scripts/config.js
          printf '    repo: "%s",\n' "${{ github.event.repository.name }}" >> scripts/config.js
          printf '    path: "data/data.json",\n' >> scripts/config.js
          printf '    branch: "main"\n' >> scripts/config.js
          printf '};\n' >> scripts/config.js
          printf 'console.log("✅ GitHub Config loaded");\n' >> scripts/config.js
          
          echo "=== config.js content ==="
          cat scripts/config.js
          echo "========================="

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
