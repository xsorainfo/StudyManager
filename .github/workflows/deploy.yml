name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config.js
        run: |
          mkdir -p scripts
          
          # 对 Token 进行 Base64 编码
          ENCODED_TOKEN=$(echo -n '${{ secrets.STUDYAPP }}' | base64 | tr -d '\n')
          
          # 使用 JSON.stringify 确保特殊字符被正确转义
          cat > scripts/config.js << EOF
          // 自動生成ファイル
          window.GITHUB_CONFIG = {
              tokenEncoded: ${ENCODED_TOKEN | tojson},
              owner: '${{ github.repository_owner }}',
              repo: '${{ github.event.repository.name }}',
              path: 'data/data.json',
              branch: 'main'
          };
          console.log('✅ GitHub Config loaded');
          EOF
          
          echo "=== config.js content ==="
          cat scripts/config.js
          echo "========================="

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
